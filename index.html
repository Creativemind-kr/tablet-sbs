<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBS아카데미컴퓨터아트학원 — 강좌 안내</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <!-- Firebase compat CDN (빌드 불필요) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <style>
  /* ══════════════════════════════════════
     1. TOKENS & COURSE COLOR SYSTEM
  ══════════════════════════════════════ */
  :root {
    --c-bg:           #ffffff;
    --c-bg-2:         #f7f7f5;
    --c-text:         #111111;
    --c-text-2:       #555555;
    --c-text-3:       #aaaaaa;
    --c-border:       #e8e8e8;
    --c-black:        #000000;

    --c-course:       #111111;
    --c-course-tint:  #f7f7f5;

    --font: 'Noto Sans KR', -apple-system, sans-serif;

    --t-xs:   0.72rem;
    --t-sm:   0.85rem;
    --t-md:   1rem;
    --t-lg:   1.15rem;
    --t-xl:   1.4rem;
    --t-2xl:  1.8rem;
    --t-3xl:  2.4rem;
    --t-4xl:  3.2rem;
    --t-hero: 4.8rem;

    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --fast:   130ms;
    --base:   260ms;
  }

  .app.c-web   { --c-course: #3B82F6; --c-course-tint: #EFF6FF; }
  .app.c-ps    { --c-course: #F97316; --c-course-tint: #FFF7ED; }
  .app.c-video { --c-course: #EF4444; --c-course-tint: #FEF2F2; }
  .app.c-uiux  { --c-course: #8B5CF6; --c-course-tint: #F5F3FF; }

  /* ══════════════════════════════════════
     2. RESET
  ══════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--c-text);
    background: var(--c-bg);
    -webkit-font-smoothing: antialiased;
  }
  button {
    cursor: pointer; border: none; background: none;
    font: inherit; color: inherit;
    touch-action: manipulation;
  }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }

  /* ══════════════════════════════════════
     3. LAYOUT
  ══════════════════════════════════════ */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ══════════════════════════════════════
     4. HEADER
  ══════════════════════════════════════ */
  .header {
    flex-shrink: 0;
    height: 58px;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 28px;
    background: var(--c-bg);
    position: relative;
    z-index: 10;
  }
  .header__logo {
    font-size: var(--t-sm);
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header__logo span {
    color: var(--c-text-3);
    font-weight: 400;
    margin-left: 6px;
    font-size: var(--t-xs);
  }
  .main-nav {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .main-nav::-webkit-scrollbar { display: none; }
  .main-nav__btn {
    padding: 7px 15px;
    border-radius: 8px;
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--c-text-3);
    white-space: nowrap;
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background var(--fast), color var(--fast);
  }
  .main-nav__btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c-border);
    flex-shrink: 0;
    transition: background var(--base);
  }
  .main-nav__btn:hover { color: var(--c-text); background: var(--c-bg-2); }
  .main-nav__btn.is-active { color: var(--c-text); font-weight: 700; background: var(--c-bg-2); }
  .main-nav__btn.is-active .dot { background: var(--c-course); }

  .header__indicator {
    margin-left: auto;
    font-size: var(--t-xs);
    color: var(--c-text-3);
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
    padding: 8px 4px;
  }

  /* ══════════════════════════════════════
     5. CONTENT AREA & PAGES
  ══════════════════════════════════════ */
  .content-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px) scale(0.99);
    transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    padding: 44px 40px 64px;
  }
  .page.is-active {
    opacity: 1;
    pointer-events: auto;
    transform: none;
  }
  .page.exit {
    opacity: 0;
    transform: translateY(-6px) scale(0.99);
    transition: opacity 150ms, transform 150ms;
  }
  .app.is-admin .page { padding-bottom: 80px; }
  .page__inner { max-width: 860px; margin: 0 auto; }
  .page-label {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 12px;
  }

  /* ══════════════════════════════════════
     6. PAGE 1 — 학원 소개
  ══════════════════════════════════════ */
  .hero-title {
    font-size: var(--t-hero);
    font-weight: 800;
    letter-spacing: -.05em;
    line-height: 1.04;
    margin-bottom: 20px;
  }
  .hero-title em {
    font-style: normal;
    position: relative;
    display: inline-block;
  }
  .hero-title em::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 2px;
    height: 6px;
    background: var(--c-course);
    border-radius: 3px;
    opacity: 0.35;
    transition: background var(--base);
  }
  .hero-sub {
    font-size: var(--t-lg);
    color: var(--c-text-2);
    margin-bottom: 48px;
    font-weight: 400;
  }
  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--c-border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 52px;
  }
  .stat-card {
    padding: 24px 28px;
    border-right: 1px solid var(--c-border);
  }
  .stat-card:last-child { border-right: none; }
  .stat-num {
    display: block;
    font-size: var(--t-3xl);
    font-weight: 800;
    letter-spacing: -.045em;
    color: var(--c-text);
    margin-bottom: 3px;
    line-height: 1;
  }
  .stat-lbl { font-size: var(--t-sm); color: var(--c-text-3); }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .feature-card {
    padding: 26px;
    border: 1px solid var(--c-border);
    border-radius: 18px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    transition: border-color var(--base), box-shadow var(--base);
    position: relative;
  }
  .feature-card:hover {
    border-color: var(--c-course);
    box-shadow: 0 0 0 1px var(--c-course);
  }
  .feature-card__icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--c-course-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    flex-shrink: 0;
    transition: background var(--base);
  }
  .feature-card__title { font-size: var(--t-md); font-weight: 700; margin-bottom: 5px; letter-spacing: -.01em; }
  .feature-card__desc  { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.7; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .badge {
    padding: 7px 14px;
    border: 1px solid var(--c-border);
    border-radius: 99px;
    font-size: var(--t-sm);
    color: var(--c-text-2);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* ══════════════════════════════════════
     7. SUB-NAV
  ══════════════════════════════════════ */
  .sub-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
    align-items: center;
  }
  .sub-nav::-webkit-scrollbar { display: none; }
  .sub-nav__btn {
    padding: 9px 18px;
    border-radius: 99px;
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--c-text-3);
    white-space: nowrap;
    min-height: 40px;
    display: flex;
    align-items: center;
    border: 1px solid transparent;
    transition: background var(--fast), color var(--fast), border-color var(--fast);
  }
  .sub-nav__btn:hover { color: var(--c-text); background: var(--c-bg-2); }
  .sub-nav__btn.is-active {
    background: var(--c-course);
    color: #ffffff;
    font-weight: 700;
    border-color: var(--c-course);
  }

  /* ══════════════════════════════════════
     8. COURSE VIEW
  ══════════════════════════════════════ */
  .course-view { display: none; }
  .course-view.is-active {
    display: block;
    animation: fadeUp 210ms var(--ease);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .course-card {
    border: 1px solid var(--c-border);
    border-top: 4px solid var(--c-course);
    border-radius: 0 0 20px 20px;
    background: var(--c-course-tint);
    padding: 32px;
    transition: border-top-color var(--base), background var(--base);
  }
  .course-card__meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .course-card__tag {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--c-course);
    transition: color var(--base);
  }
  .course-card__duration { font-size: var(--t-sm); color: var(--c-text-3); font-weight: 500; }
  .course-card__body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }
  .course-card__title {
    font-size: var(--t-2xl);
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1.18;
    margin-bottom: 14px;
    white-space: pre-line;
  }
  .course-card__desc { font-size: var(--t-md); color: var(--c-text-2); line-height: 1.75; }
  .course-card__skills {
    background: var(--c-bg);
    border: 1px solid var(--c-border);
    border-radius: 14px;
    padding: 22px;
  }
  .course-card__skills-label {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 14px;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tags li {
    padding: 6px 14px;
    border: 1.5px solid var(--c-course);
    border-radius: 99px;
    font-size: var(--t-xs);
    color: var(--c-course);
    font-weight: 600;
    transition: border-color var(--base), color var(--base);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* ══════════════════════════════════════
     9. CURRICULUM ACCORDION
  ══════════════════════════════════════ */
  .curr-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .curr-header__title { font-size: var(--t-2xl); font-weight: 800; letter-spacing: -.03em; }
  .curr-header__meta  { font-size: var(--t-sm); color: var(--c-text-3); text-align: right; line-height: 1.6; }

  .accordion { border-top: 1px solid var(--c-border); }

  /* Accordion head: wraps trigger + optional admin del button */
  .accordion__head {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--c-border);
  }
  .accordion__head .admin-del-btn { flex-shrink: 0; margin-right: 8px; }

  .accordion__trigger {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 0;
    text-align: left;
    min-height: 56px;
    transition: background var(--fast);
  }
  .accordion__trigger:active { background: var(--c-bg-2); }
  .accordion__num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--c-border);
    font-size: var(--t-xs);
    font-weight: 700;
    color: var(--c-text-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background var(--base), border-color var(--base), color var(--base);
  }
  .accordion__trigger[aria-expanded="true"] .accordion__num {
    background: var(--c-course);
    border-color: var(--c-course);
    color: #fff;
  }
  .accordion__week { font-size: var(--t-sm); font-weight: 700; color: var(--c-text-3); min-width: 72px; flex-shrink: 0; }
  .accordion__topic { flex: 1; font-size: var(--t-md); font-weight: 500; letter-spacing: -.01em; }
  .accordion__chevron {
    width: 7px; height: 7px;
    border-right: 1.8px solid var(--c-text-3);
    border-bottom: 1.8px solid var(--c-text-3);
    transform: rotate(45deg);
    flex-shrink: 0;
    transition: transform 240ms var(--ease);
    margin-right: 4px;
  }
  .accordion__trigger[aria-expanded="true"] .accordion__chevron { transform: rotate(-135deg); }
  .accordion__body { max-height: 0; overflow: hidden; transition: max-height 320ms var(--ease); }
  .accordion__inner {
    border-left: 3px solid var(--c-course);
    margin-left: calc(28px + 14px);
    padding: 12px 0 20px 18px;
    transition: border-color var(--base);
  }
  .topic-list li {
    font-size: var(--t-sm);
    color: var(--c-text-2);
    line-height: 2.1;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .topic-list li::before { content: '—'; color: var(--c-text-3); flex-shrink: 0; }

  /* ══════════════════════════════════════
     10. CHECKLIST
  ══════════════════════════════════════ */
  .checklist-intro {
    font-size: var(--t-lg);
    color: var(--c-text-2);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .checklist-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .checklist-card {
    padding: 26px 26px 26px 22px;
    border: 1px solid var(--c-border);
    border-left: 4px solid var(--c-border);
    border-radius: 16px;
    transition: border-left-color var(--base);
  }
  .checklist-card[data-colorkey="web"]   { --cl: #3B82F6; }
  .checklist-card[data-colorkey="ps"]    { --cl: #F97316; }
  .checklist-card[data-colorkey="video"] { --cl: #EF4444; }
  .checklist-card[data-colorkey="uiux"]  { --cl: #8B5CF6; }
  .checklist-card { border-left-color: var(--cl, #e8e8e8); }
  .checklist-card__tag {
    display: inline-block;
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--cl, var(--c-text-3));
    margin-bottom: 8px;
  }
  .checklist-card__title { font-size: var(--t-md); font-weight: 700; margin-bottom: 18px; letter-spacing: -.01em; }
  .checklist-card__list { display: flex; flex-direction: column; gap: 10px; }
  .checklist-card__list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: var(--t-sm);
    color: var(--c-text-2);
    line-height: 1.6;
  }
  .check-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--cl, var(--c-text-3));
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  /* ══════════════════════════════════════
     11. FOCUS
  ══════════════════════════════════════ */
  :focus-visible { outline: 2px solid var(--c-course); outline-offset: 2px; border-radius: 4px; }

  /* ══════════════════════════════════════
     12. RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 680px) {
    :root { --t-hero: 3rem; --t-3xl: 1.8rem; --t-2xl: 1.4rem; }
    .page { padding: 28px 18px 48px; }
    .stat-row { grid-template-columns: 1fr; border-radius: 12px; }
    .stat-card { border-right: none; border-bottom: 1px solid var(--c-border); }
    .stat-card:last-child { border-bottom: none; }
    .feature-grid { grid-template-columns: 1fr; }
    .feature-card { padding: 18px; gap: 14px; }
    .checklist-grid { grid-template-columns: 1fr; }
    .course-card__body { grid-template-columns: 1fr; }
    .header { padding: 0 16px; gap: 14px; }
  }
  @media (min-width: 1100px) {
    :root { --t-hero: 5.5rem; }
    .feature-grid { grid-template-columns: repeat(4, 1fr); }
    .checklist-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ══════════════════════════════════════
     13. ADMIN — 로그인 모달
  ══════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 36px 32px;
    width: min(360px, 90vw);
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  }
  .modal-box h3 { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 20px; }
  .modal-box input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--c-border);
    border-radius: 10px;
    font: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 150ms;
  }
  .modal-box input[type="password"]:focus { border-color: #3B82F6; }
  .modal-error { color: #EF4444; font-size: 0.78rem; margin-top: 8px; display: none; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .modal-btn {
    flex: 1; padding: 12px;
    border-radius: 10px;
    font: inherit; font-size: 0.9rem; font-weight: 700;
    border: none; cursor: pointer;
    transition: background 150ms;
  }
  .modal-btn-cancel  { background: var(--c-bg-2); color: var(--c-text-2); }
  .modal-btn-cancel:hover { background: #e0e0de; }
  .modal-btn-confirm { background: #111; color: #fff; }
  .modal-btn-confirm:hover { background: #333; }

  /* ══════════════════════════════════════
     14. ROADMAP
  ══════════════════════════════════════ */
  .roadmap-steps { display: flex; flex-direction: column; gap: 0; margin-top: 24px; }
  .roadmap-step { display: flex; gap: 20px; position: relative; padding-bottom: 28px; }
  .roadmap-step:last-child { padding-bottom: 0; }
  .roadmap-step__line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .roadmap-step__dot { width: 44px; height: 44px; border-radius: 50%; background: var(--c-course); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .8rem; letter-spacing: .04em; }
  .roadmap-step__connector { width: 2px; flex: 1; background: var(--c-border); margin-top: 6px; min-height: 20px; }
  .roadmap-step:last-child .roadmap-step__connector { display: none; }
  .roadmap-step__body { padding-top: 10px; padding-left: 4px; flex: 1; }
  .roadmap-step__title { font-size: var(--t-lg); font-weight: 700; margin-bottom: 3px; }
  .roadmap-step__weeks { font-size: var(--t-sm); color: var(--c-course); font-weight: 600; margin-bottom: 6px; }
  .roadmap-step__desc { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.65; }

  /* ══════════════════════════════════════
     15. INSTRUCTORS
  ══════════════════════════════════════ */
  .instructor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 24px; }
  .instructor-card { background: var(--c-bg-2); border-radius: 16px; padding: 26px 22px; display: flex; gap: 18px; align-items: flex-start; }

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
function setByPath(path, value) {
  const parts = path.split('.');
  const root  = parts[0];
  const keys  = parts.slice(1);
  let curr;
  if (root === 'ui')          curr = UI_DATA;
  else if (root === 'instructors') curr = INSTRUCTORS_DATA;
  else if (root === 'reviews')     curr = REVIEWS_DATA;
  else                             curr = COURSES;
  for (let i = 0; i < keys.length - 1; i++) {
    const k = keys[i];
    curr = curr[isNaN(k) ? k : +k];
    if (curr == null) return;
  }
  const last = keys[keys.length - 1];
  curr[isNaN(last) ? last : +last] = value;
}

/* Editable span helper — wraps text in contenteditable only in edit mode */
function E(path, text) {
  if (!isEditMode) return String(text);
  const safe = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span contenteditable="true" data-path="${path}" class="admin-editable">${safe}</span>`;
}

══════════════════════════════════════════════════ */
const FB_READY = !FIREBASE_CONFIG.apiKey.startsWith('여기에');

async function initFirebase() {
  if (!FB_READY) { console.info('Firebase 미설정 — 오프라인 모드로 실행 중'); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db      = firebase.firestore();
    storage = firebase.storage();
    await loadFromFirestore();
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e.message);
  }
}

async function loadFromFirestore() {
  if (!db) return;
  try {
    const snap = await db.collection('curriculum').doc('main').get();
    if (snap.exists) {
      const data = snap.data();
      if (data.courses && Object.keys(data.courses).length) COURSES = data.courses;
      if (data.ui)          UI_DATA          = data.ui;
      if (data.instructors) INSTRUCTORS_DATA = data.instructors;
      if (data.reviews)     REVIEWS_DATA     = data.reviews;
    }
  } catch(e) {
    console.warn('데이터 로드 실패, 기본값 사용:', e.message);
  }
}

async function saveData() {
  if (!db) {
    showToast('Firebase 미연결 — FIREBASE_CONFIG 설정 필요', 'error');
    return;
  }
  try {
    await db.collection('curriculum').doc('main').set({
      courses:     COURSES,
      ui:          UI_DATA,
      instructors: INSTRUCTORS_DATA,
      reviews:     REVIEWS_DATA,
      updatedAt:   new Date().toISOString()
    });
    showToast('저장되었습니다 ✓');
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
    console.error(e);
  }
}

══════════════════════════════════════════════════ */
let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type ? ' ' + type : '');
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ══════════════════════════════════════════════════
   ADMIN AUTH
══════════════════════════════════════════════════ */
let _holdTimer;

function initAdminTrigger() {
  const ind = document.getElementById('indicator');
  ind.addEventListener('pointerdown', () => {
    _holdTimer = setTimeout(showLoginModal, 2000);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev =>
    ind.addEventListener(ev, () => clearTimeout(_holdTimer))
  );
  if (sessionStorage.getItem('admin') === '1') {
    isAdmin = true;
    showAdminUI();
  }
}

function showLoginModal() {
  if (isAdmin) return;
  document.getElementById('login-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw').focus(), 60);
}

function submitLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    sessionStorage.setItem('admin', '1');
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('admin-pw').value = '';
    document.getElementById('login-error').style.display = 'none';
    showAdminUI();
    showToast('관리자로 로그인됨');
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-pw').focus();
  }
}

function cancelLogin() {
  document.getElementById('login-modal').style.display = 'none';
  document.getElementById('admin-pw').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function showAdminUI() {
  document.getElementById('admin-toolbar').style.display = 'flex';
  appEl.classList.add('is-admin');
}

function adminLogout() {
  isAdmin    = false;
  isEditMode = false;
  sessionStorage.removeItem('admin');
  document.getElementById('admin-toolbar').style.display = 'none';
  appEl.classList.remove('is-admin','admin-edit');
  document.getElementById('edit-btn').classList.remove('is-on');
  document.getElementById('edit-btn').textContent = '✏️ 편집 모드';
  document.getElementById('admin-status').textContent = '';
  renderAll();
  renderUI();
}

/* ══════════════════════════════════════════════════
   EDIT MODE TOGGLE
══════════════════════════════════════════════════ */
function toggleEditMode() {
  isEditMode = !isEditMode;
  appEl.classList.toggle('admin-edit', isEditMode);
  const btn = document.getElementById('edit-btn');
  btn.classList.toggle('is-on', isEditMode);
  btn.textContent = isEditMode ? '👁 미리보기' : '✏️ 편집 모드';
  document.getElementById('admin-status').textContent = isEditMode ? '— 텍스트 클릭 후 수정' : '';
  renderUI();
  renderAll();
  activateCoursePanels(currentCourse);
}

function renderCurriculumView(id) {
  const c  = COURSES[id];

      </div>`).join('');
    const wGallery = (wImgs.length > 0 || em) ? `
      <div class="img-gallery" style="margin-top:14px">
        ${wGalleryItems}

      </div>` : '';

    return `
      <div class="accordion">

          <button class="accordion__trigger" aria-expanded="false">
            <span class="accordion__num">${wi+1}</span>
            <span class="accordion__week">${em ? E('courses.'+id+'.curriculum.'+wi+'.week', item.week) : item.week}</span>
            <span class="accordion__topic">${em ? E('courses.'+id+'.curriculum.'+wi+'.topic', item.topic) : item.topic}</span>

      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="curr-header">
      <h2 class="curr-header__title">${c.label}</h2>
      <div class="curr-header__meta">${c.duration}</div>
    </div>

function setCourseColor(courseId) {
  PALETTE_KEYS.forEach(k => appEl.classList.remove('c-'+k));
  if (!courseId) return;
  const ck = COURSES[courseId]?.colorKey || courseId;
  appEl.classList.add('c-' + (PALETTE_KEYS.includes(ck) ? ck : 'web'));
}

/* ══════════════════════════════════════════════════
   COURSE PANEL ACTIVATION
══════════════════════════════════════════════════ */
function activateCoursePanels(courseId) {
  const ids = Object.keys(COURSES);
  if (!COURSES[courseId]) courseId = ids[0];
  if (!courseId) return;

  document.querySelectorAll('.sub-nav__btn').forEach(b =>
    b.classList.toggle('is-active', b.dataset.course === courseId));

  document.querySelectorAll('#roadmap-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'rm-'+courseId));
  document.querySelectorAll('#curr-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'cr-'+courseId));

  setCourseColor(courseId);
  currentCourse = courseId;
}

/* ══════════════════════════════════════════════════
   PAGE SWITCHING
══════════════════════════════════════════════════ */
const PAGE_ORDER = ['intro','roadmap','curriculum','instructors','reviews','checklist'];

function goToPage(pageId) {
  if (pageId === currentPage) return;
  const outEl = document.getElementById('page-'+currentPage);
  const inEl  = document.getElementById('page-'+pageId);
  outEl.classList.add('exit');
  outEl.classList.remove('is-active');
  setTimeout(() => outEl.classList.remove('exit'), 200);
  inEl.classList.add('is-active');
  inEl.scrollTop = 0;
  document.querySelectorAll('.main-nav__btn').forEach(btn =>
    btn.classList.toggle('is-active', btn.dataset.page === pageId));
  document.getElementById('indicator').textContent =
    `${PAGE_ORDER.indexOf(pageId)+1} / ${PAGE_ORDER.length}`;
  if (['intro','instructors','reviews'].includes(pageId)) setCourseColor(null);
  currentPage = pageId;
}

/* ══════════════════════════════════════════════════
   GLOBAL EVENT DELEGATION
══════════════════════════════════════════════════ */
// Blur (capture) — editable field 반영
document.addEventListener('blur', e => {
  if (!isEditMode) return;
  const el = e.target;
  if (!el.dataset.path) return;
  setByPath(el.dataset.path, el.innerText.trim());
}, true);

// Click — main-nav / sub-nav / accordion
document.addEventListener('click', e => {
  // Main nav
  const mainBtn = e.target.closest('.main-nav__btn');
  if (mainBtn?.dataset.page) { goToPage(mainBtn.dataset.page); return; }

  // Sub-nav
  const subBtn = e.target.closest('.sub-nav__btn');
  if (subBtn?.dataset.course) { activateCoursePanels(subBtn.dataset.course); return; }

  // Accordion trigger (admin del btn 제외)
  const trigger = e.target.closest('.accordion__trigger');
  if (trigger && !e.target.closest('.admin-del-btn')) {
    const accordion = trigger.closest('.accordion');
    const body = accordion?.querySelector('.accordion__body');
    if (!body) return;
    const open = trigger.getAttribute('aria-expanded') === 'true';
    trigger.setAttribute('aria-expanded', String(!open));
    body.style.maxHeight = open ? '0' : body.scrollHeight + 'px';
  }
});

function addCourse() {
  const name = prompt('새 강좌 이름:');
  if (!name?.trim()) return;
  const key = 'c' + Date.now();
  const _usedColors = Object.values(COURSES).map(c => c.colorKey);
  const _colorKey = PALETTE_KEYS.find(k => !_usedColors.includes(k))
    || PALETTE_KEYS[Object.keys(COURSES).length % PALETTE_KEYS.length];
  COURSES[key] = {
    colorKey:   _colorKey,
    label:      name.trim(),
    duration:   '8주 과정 · 주 3회',
    title:      name.trim(),
    desc:       '강좌 설명을 입력하세요.',
    tags:       ['태그 입력'],
    roadmap:    [{ phase: '01', title: '기초 입문', weeks: '1–4주차', desc: '설명을 입력하세요' }],
    images:     [],
    curriculum: [{ week: '1–2주차', topic: '주제 입력', items: ['세부 항목 입력'] }],
    checklist:  ['준비물을 입력하세요']
  };
  renderAll();
  activateCoursePanels(key);
}
function deleteCourse(id) {
  if (!confirm(`'${COURSES[id].label}' 강좌를 삭제하시겠습니까?`)) return;
  delete COURSES[id];
  const remaining = Object.keys(COURSES);
  renderAll();
  if (remaining.length) activateCoursePanels(remaining[0]);
}
function addCourseTag(id) {
  const tag = prompt('새 기술 태그:');

  COURSES[id].tags.push(tag.trim());
  renderCourseView(id);
  if (currentCourse === id) {
    document.getElementById('cv-'+id)?.classList.add('is-active');

}

/* ══════════════════════════════════════════════════
   CRUD — 커리큘럼 이미지
══════════════════════════════════════════════════ */
function addImage(id, wi) {
  if (!storage) { showToast('Firebase Storage 미연결', 'error'); return; }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    showToast('업로드 중...');
    try {
      for (const file of files) {
        const ref = storage.ref(`curriculum/${id}/w${wi}_${Date.now()}_${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        if (!COURSES[id].curriculum[wi].images) COURSES[id].curriculum[wi].images = [];
        COURSES[id].curriculum[wi].images.push(url);
      }
      renderCurriculumView(id);
      document.getElementById('cr-'+id)?.classList.add('is-active');
      showToast(`이미지 ${files.length}장 업로드 완료 ✓`);
    } catch(err) {
      showToast('업로드 실패: ' + err.message, 'error');
    }
  };
  input.click();
}
function deleteImage(id, wi, ii) {
  COURSES[id].curriculum[wi].images.splice(ii, 1);
  renderCurriculumView(id);
  document.getElementById('cr-'+id)?.classList.add('is-active');
}
function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox__close" onclick="this.parentElement.remove()">✕</button><img src="${url}" alt="">`;
  lb.addEventListener('click', e => { if (e.target === lb) lb.remove(); });
  document.body.appendChild(lb);
}
