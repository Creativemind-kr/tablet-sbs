<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBS아카데미컴퓨터아트학원 — 강좌 안내</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F97316">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SBS아카데미">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=optional" rel="stylesheet">
  <!-- Firebase compat CDN — app+firestore는 defer로 조기 로드, storage는 필요 시 동적 로드 -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <style>
  /* ══════════════════════════════════════
     1. TOKENS & COURSE COLOR SYSTEM
  ══════════════════════════════════════ */
  :root {
    --c-bg:           #ffffff;
    --c-bg-2:         #f7f7f5;
    --c-text:         #111111;
    --c-text-2:       #555555;
    --c-text-3:       #aaaaaa;
    --c-border:       #e8e8e8;
    --c-black:        #000000;

    --c-course:       #111111;
    --c-course-tint:  #f7f7f5;

    --font: 'Noto Sans KR', -apple-system, sans-serif;

    --t-xs:   0.72rem;
    --t-sm:   0.85rem;
    --t-md:   1rem;
    --t-lg:   1.15rem;
    --t-xl:   1.4rem;
    --t-2xl:  1.8rem;
    --t-3xl:  2.4rem;
    --t-4xl:  3.2rem;
    --t-hero: 4.8rem;

    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --fast:   130ms;
    --base:   260ms;
  }

  .app.c-web   { --c-course: #3B82F6; --c-course-tint: #EFF6FF; }
  .app.c-ps    { --c-course: #F97316; --c-course-tint: #FFF7ED; }
  .app.c-video { --c-course: #EF4444; --c-course-tint: #FEF2F2; }
  .app.c-uiux  { --c-course: #8B5CF6; --c-course-tint: #F5F3FF; }

  /* ══════════════════════════════════════
     2. RESET
  ══════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--c-text);
    background: var(--c-bg);
    -webkit-font-smoothing: antialiased;
  }
  button {
    cursor: pointer; border: none; background: none;
    font: inherit; color: inherit;
    touch-action: manipulation;
  }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }

  /* ══════════════════════════════════════
     3. LAYOUT
  ══════════════════════════════════════ */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ══════════════════════════════════════
     4. HEADER
  ══════════════════════════════════════ */
  .header {
    flex-shrink: 0;
    height: 58px;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 28px;
    background: var(--c-bg);
    position: relative;
    z-index: 10;
  }
  .header__logo {
    font-size: var(--t-sm);
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header__logo span {
    color: var(--c-text-3);
    font-weight: 400;
    margin-left: 6px;
    font-size: var(--t-xs);
  }
  .main-nav {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .main-nav::-webkit-scrollbar { display: none; }
  .main-nav__btn {
    padding: 7px 15px;
    border-radius: 8px;
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--c-text-3);
    white-space: nowrap;
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background var(--fast), color var(--fast);
  }
  .main-nav__btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c-border);
    flex-shrink: 0;
    transition: background var(--base);
  }
  .main-nav__btn:hover { color: var(--c-text); background: var(--c-bg-2); }
  .main-nav__btn.is-active { color: var(--c-text); font-weight: 700; background: var(--c-bg-2); }
  .main-nav__btn.is-active .dot { background: var(--c-course); }

  .header__indicator {
    margin-left: auto;
    font-size: var(--t-xs);
    color: var(--c-text-3);
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
    padding: 8px 4px;
  }

  /* ══════════════════════════════════════
     5. CONTENT AREA & PAGES
  ══════════════════════════════════════ */
  .content-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px) scale(0.99);
    transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    padding: 44px 40px 64px;
  }
  .page.is-active {
    opacity: 1;
    pointer-events: auto;
    transform: none;
  }
  .page.exit {
    opacity: 0;
    transform: translateY(-6px) scale(0.99);
    transition: opacity 150ms, transform 150ms;
  }
  .app.is-admin .page { padding-bottom: 80px; }
  .page__inner { max-width: 860px; margin: 0 auto; }
  .page-label {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 12px;
  }

  /* ══════════════════════════════════════
     6. PAGE 1 — 학원 소개
  ══════════════════════════════════════ */
  .hero-title {
    font-size: var(--t-hero);
    font-weight: 800;
    letter-spacing: -.05em;
    line-height: 1.04;
    margin-bottom: 20px;
  }
  .hero-title em {
    font-style: normal;
    position: relative;
    display: inline-block;
  }
  .hero-title em::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 2px;
    height: 6px;
    background: var(--c-course);
    border-radius: 3px;
    opacity: 0.35;
    transition: background var(--base);
  }
  .hero-sub {
    font-size: var(--t-lg);
    color: var(--c-text-2);
    margin-bottom: 48px;
    font-weight: 400;
  }
  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--c-border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 52px;
  }
  .stat-card {
    padding: 24px 28px;
    border-right: 1px solid var(--c-border);
  }
  .stat-card:last-child { border-right: none; }
  .stat-num {
    display: block;
    font-size: var(--t-3xl);
    font-weight: 800;
    letter-spacing: -.045em;
    color: var(--c-text);
    margin-bottom: 3px;
    line-height: 1;
  }
  .stat-lbl { font-size: var(--t-sm); color: var(--c-text-3); }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .feature-card {
    padding: 26px;
    border: 1px solid var(--c-border);
    border-radius: 18px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    transition: border-color var(--base), box-shadow var(--base);
    position: relative;
  }
  .feature-card:hover {
    border-color: var(--c-course);
    box-shadow: 0 0 0 1px var(--c-course);
  }
  .feature-card__icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--c-course-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    flex-shrink: 0;
    transition: background var(--base);
  }
  .feature-card__title { font-size: var(--t-md); font-weight: 700; margin-bottom: 5px; letter-spacing: -.01em; }
  .feature-card__desc  { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.7; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .badge {
    padding: 7px 14px;
    border: 1px solid var(--c-border);
    border-radius: 99px;
    font-size: var(--t-sm);
    color: var(--c-text-2);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* ══════════════════════════════════════
     7. SUB-NAV
  ══════════════════════════════════════ */
  .sub-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
    align-items: center;
  }
  .sub-nav::-webkit-scrollbar { display: none; }
  .sub-nav__btn {
    padding: 9px 18px;
    border-radius: 99px;
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--c-text-3);
    white-space: nowrap;
    min-height: 40px;
    display: flex;
    align-items: center;
    border: 1px solid transparent;
    transition: background var(--fast), color var(--fast), border-color var(--fast);
  }
  .sub-nav__btn:hover { color: var(--c-text); background: var(--c-bg-2); }
  .sub-nav__btn.is-active {
    background: var(--c-course);
    color: #ffffff;
    font-weight: 700;
    border-color: var(--c-course);
  }

  /* ══════════════════════════════════════
     8. COURSE VIEW
  ══════════════════════════════════════ */
  .course-view { display: none; }
  .course-view.is-active {
    display: block;
    animation: fadeUp 210ms var(--ease);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .course-card {
    border: 1px solid var(--c-border);
    border-top: 4px solid var(--c-course);
    border-radius: 0 0 20px 20px;
    background: var(--c-course-tint);
    padding: 32px;
    transition: border-top-color var(--base), background var(--base);
  }
  .course-card__meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .course-card__tag {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--c-course);
    transition: color var(--base);
  }
  .course-card__duration { font-size: var(--t-sm); color: var(--c-text-3); font-weight: 500; }
  .course-card__body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }
  .course-card__title {
    font-size: var(--t-2xl);
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1.18;
    margin-bottom: 14px;
    white-space: pre-line;
  }
  .course-card__desc { font-size: var(--t-md); color: var(--c-text-2); line-height: 1.75; }
  .course-card__skills {
    background: var(--c-bg);
    border: 1px solid var(--c-border);
    border-radius: 14px;
    padding: 22px;
  }
  .course-card__skills-label {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 14px;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tags li {
    padding: 6px 14px;
    border: 1.5px solid var(--c-course);
    border-radius: 99px;
    font-size: var(--t-xs);
    color: var(--c-course);
    font-weight: 600;
    transition: border-color var(--base), color var(--base);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* ══════════════════════════════════════
     9. CURRICULUM ACCORDION
  ══════════════════════════════════════ */
  .curr-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .curr-header__title { font-size: var(--t-2xl); font-weight: 800; letter-spacing: -.03em; }
  .curr-header__meta  { font-size: var(--t-sm); color: var(--c-text-3); text-align: right; line-height: 1.6; }

  .accordion { border-top: 1px solid var(--c-border); }

  /* Accordion head: wraps trigger + optional admin del button */
  .accordion__head {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--c-border);
  }
  .accordion__head .admin-del-btn { flex-shrink: 0; margin-right: 8px; }

  .accordion__trigger {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 0;
    text-align: left;
    min-height: 56px;
    transition: background var(--fast);
  }
  .accordion__trigger:active { background: var(--c-bg-2); }
  .accordion__num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--c-border);
    font-size: var(--t-xs);
    font-weight: 700;
    color: var(--c-text-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background var(--base), border-color var(--base), color var(--base);
  }
  .accordion__trigger[aria-expanded="true"] .accordion__num {
    background: var(--c-course);
    border-color: var(--c-course);
    color: #fff;
  }
  .accordion__week { font-size: var(--t-sm); font-weight: 700; color: var(--c-text-3); min-width: 72px; flex-shrink: 0; }
  .accordion__topic { flex: 1; font-size: var(--t-md); font-weight: 500; letter-spacing: -.01em; }
  .accordion__chevron {
    width: 7px; height: 7px;
    border-right: 1.8px solid var(--c-text-3);
    border-bottom: 1.8px solid var(--c-text-3);
    transform: rotate(45deg);
    flex-shrink: 0;
    transition: transform 240ms var(--ease);
    margin-right: 4px;
  }
  .accordion__trigger[aria-expanded="true"] .accordion__chevron { transform: rotate(-135deg); }
  .accordion__body { max-height: 0; overflow: hidden; transition: max-height 320ms var(--ease); }
  .accordion__inner {
    border-left: 3px solid var(--c-course);
    margin-left: calc(28px + 14px);
    padding: 12px 0 20px 18px;
    transition: border-color var(--base);
  }
  .topic-list li {
    font-size: var(--t-sm);
    color: var(--c-text-2);
    line-height: 2.1;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .topic-list li::before { content: '—'; color: var(--c-text-3); flex-shrink: 0; }
  .item-detail { font-weight: 300; color: var(--c-text-3); }
  /* 계층형 커리큘럼 */
  .topic-list .curr-week-hd { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--c-course); margin: 16px 0 4px; padding-top: 14px; border-top: 1px solid var(--c-border); line-height: 1.4; }
  .topic-list .curr-week-hd:first-child { margin-top: 0; border-top: none; padding-top: 0; }
  .topic-list .curr-week-hd::before { display: none; }
  .topic-list .curr-topic-hd { font-weight: 700; color: var(--c-text); line-height: 1.6; gap: 6px; }
  .topic-list .curr-topic-hd::before { display: none; }
  .topic-list .curr-sub-item { padding-left: 14px; line-height: 1.9; }
  .topic-list .curr-sub-item::before { content: '—'; color: var(--c-text-3); flex-shrink: 0; }
  .diff-stars { font-size: 11px; letter-spacing: 1.5px; flex-shrink: 0; margin-left: 6px; cursor: default; }
  .diff-stars .s-on { color: #F59E0B; }
  .diff-stars .s-off { color: var(--c-border); }
  .diff-stars.editable { cursor: pointer; }
  .logo-row { display: flex; align-items: center; gap: 5px; flex-shrink: 0; margin-left: 4px; }
  .logo-badge { display: inline-flex; align-items: center; gap: 2px; }
  .logo-badge img { width: 15px; height: 15px; filter: grayscale(1) opacity(0.55); }
  .logo-badge__text { font-size: 9px; background: var(--c-bg-2); border: 1px solid var(--c-border); border-radius: 3px; padding: 1px 4px; color: var(--c-text-3); }
  .logo-del-btn { font-size: 9px; background: none; border: none; color: var(--c-text-3); cursor: pointer; padding: 0 1px; line-height: 1; }
  .logo-add-btn { font-size: 10px; background: none; border: 1px dashed var(--c-border); border-radius: 4px; padding: 2px 6px; color: var(--c-text-3); cursor: pointer; white-space: nowrap; }
  .logo-popover { position: fixed; z-index: 300; background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 12px; padding: 12px; width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,.18); }
  .logo-popover input { width: 100%; box-sizing: border-box; border: 1px solid var(--c-border); border-radius: 6px; padding: 6px 8px; font-size: 12px; background: var(--c-bg-2); color: var(--c-text); outline: none; }
  .logo-popover-list { margin-top: 8px; max-height: 140px; overflow-y: auto; }
  .logo-popover-item { display: flex; align-items: center; gap: 8px; padding: 5px 4px; cursor: pointer; border-radius: 6px; font-size: 12px; color: var(--c-text); }
  .logo-popover-item:hover { background: var(--c-bg-2); }
  .logo-popover-item img { width: 14px; height: 14px; opacity: 0.7; }
  .prereq-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 0 0 10px calc(28px + 14px + 8px); }
  .prereq-label { font-size: 10px; color: var(--c-text-3); flex-shrink: 0; }
  .prereq-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; background: var(--c-bg-2); border: 1px solid var(--c-border); font-size: 10px; color: var(--c-text-2); }
  .prereq-chip button { background: none; border: none; color: var(--c-text-3); cursor: pointer; padding: 0 0 0 2px; font-size: 10px; line-height: 1; }
  .logo-popover-item.is-selected { background: var(--c-bg-2); }
  .logo-popover-item.is-selected::after { content: '✓'; margin-left: auto; color: var(--c-course); font-size: 12px; font-weight: 700; }
  .logo-popover-close { width: 100%; margin-top: 8px; padding: 6px; border: 1px solid var(--c-border); border-radius: 6px; background: var(--c-bg-2); font-size: 12px; color: var(--c-text); cursor: pointer; }
  .drag-handle { cursor: grab; color: var(--c-border); padding: 0 8px 0 0; font-size: 16px; flex-shrink: 0; user-select: none; line-height: 1; }
  .drag-handle:active { cursor: grabbing; }
  /* 커리큘럼 ↔ 포트폴리오 서브탭 */
  .curr-view-tabs { display: flex; gap: 4px; padding: 0 16px 14px; }
  .curr-tab-btn { padding: 5px 16px; border-radius: 100px; border: 1px solid var(--c-border); font-size: 12px; font-weight: 600; background: none; color: var(--c-text-2); cursor: pointer; transition: background .15s, color .15s; }
  .curr-tab-btn.is-active { background: var(--c-course); color: #fff; border-color: var(--c-course); }
  .curr-tab-panel.is-hidden { display: none; }
  /* 포트폴리오 그리드 */
  .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 8px; }
  .portfolio-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; background: var(--c-bg-2); cursor: pointer; }
  .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; }
  .portfolio-item:hover img { transform: scale(1.04); }
  .portfolio-item--video { cursor: default; }
  .portfolio-item--video iframe { width: 100%; height: 100%; border: 0; }
  .portfolio-del-btn { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,.55); color: #fff; border: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .portfolio-add-btn { display: block; margin: 4px 16px 16px; width: calc(100% - 32px); padding: 12px; border: 1.5px dashed var(--c-border); border-radius: 10px; background: none; font-size: 13px; color: var(--c-text-3); cursor: pointer; text-align: center; }
  .portfolio-empty { text-align: center; color: var(--c-text-3); font-size: 13px; padding: 48px 0; grid-column: 1/-1; }
  .accordion.drag-over { border-top: 2px solid var(--c-course); }
  .accordion.is-dragging { opacity: 0.35; }

  /* ══════════════════════════════════════
     10. CHECKLIST
  ══════════════════════════════════════ */
  .checklist-intro {
    font-size: var(--t-lg);
    color: var(--c-text-2);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .checklist-card {
    padding: 28px 28px 28px 24px;
    border: 1px solid var(--c-border);
    border-left: 4px solid var(--c-border);
    border-radius: 16px;
    transition: border-left-color var(--base);
    max-width: 680px;
  }
  .checklist-card[data-colorkey="web"]   { --cl: #3B82F6; }
  .checklist-card[data-colorkey="ps"]    { --cl: #F97316; }
  .checklist-card[data-colorkey="video"] { --cl: #EF4444; }
  .checklist-card[data-colorkey="uiux"]  { --cl: #8B5CF6; }
  .checklist-card { border-left-color: var(--cl, #e8e8e8); }
  .checklist-card__tag {
    display: inline-block;
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--cl, var(--c-text-3));
    margin-bottom: 8px;
  }
  .checklist-card__title { font-size: var(--t-md); font-weight: 700; margin-bottom: 18px; letter-spacing: -.01em; }
  .checklist-card__list { display: flex; flex-direction: column; gap: 10px; }
  .checklist-card__list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: var(--t-sm);
    color: var(--c-text-2);
    line-height: 1.6;
  }
  .check-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--cl, var(--c-text-3));
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  /* ══════════════════════════════════════
     11. FOCUS
  ══════════════════════════════════════ */
  :focus-visible { outline: 2px solid var(--c-course); outline-offset: 2px; border-radius: 4px; }

  /* ══════════════════════════════════════
     12. RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 680px) {
    :root { --t-hero: 3rem; --t-3xl: 1.8rem; --t-2xl: 1.4rem; }
    .page { padding: 28px 18px 48px; }
    .stat-row { grid-template-columns: 1fr; border-radius: 12px; }
    .stat-card { border-right: none; border-bottom: 1px solid var(--c-border); }
    .stat-card:last-child { border-bottom: none; }
    .feature-grid { grid-template-columns: 1fr; }
    .feature-card { padding: 18px; gap: 14px; }
    .course-card__body { grid-template-columns: 1fr; }
    .header { padding: 0 16px; gap: 14px; }
  }
  @media (min-width: 1100px) {
    :root { --t-hero: 5.5rem; }
    .feature-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ══════════════════════════════════════
     13. ADMIN — 로그인 모달
  ══════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 36px 32px;
    width: min(360px, 90vw);
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  }
  .modal-box h3 { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 20px; }
  .modal-box input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--c-border);
    border-radius: 10px;
    font: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 150ms;
  }
  .modal-box input[type="password"]:focus { border-color: #3B82F6; }
  .modal-error { color: #EF4444; font-size: 0.78rem; margin-top: 8px; display: none; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .modal-btn {
    flex: 1; padding: 12px;
    border-radius: 10px;
    font: inherit; font-size: 0.9rem; font-weight: 700;
    border: none; cursor: pointer;
    transition: background 150ms;
  }
  .modal-btn-cancel  { background: var(--c-bg-2); color: var(--c-text-2); }
  .modal-btn-cancel:hover { background: #e0e0de; }
  .modal-btn-confirm { background: #111; color: #fff; }
  .modal-btn-confirm:hover { background: #333; }

  /* ══════════════════════════════════════
     14. ROADMAP
  ══════════════════════════════════════ */
  .roadmap-steps { display: flex; flex-direction: column; gap: 0; margin-top: 24px; }
  .roadmap-step { display: flex; gap: 20px; position: relative; padding-bottom: 28px; }
  .roadmap-step:last-child { padding-bottom: 0; }
  .roadmap-step__line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .roadmap-step__dot { width: 44px; height: 44px; border-radius: 50%; background: var(--c-course); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .8rem; letter-spacing: .04em; }
  .roadmap-step__connector { width: 2px; flex: 1; background: var(--c-border); margin-top: 6px; min-height: 20px; }
  .roadmap-step:last-child .roadmap-step__connector { display: none; }
  .roadmap-step__body { padding-top: 10px; padding-left: 4px; flex: 1; }
  .roadmap-step__title { font-size: var(--t-lg); font-weight: 700; margin-bottom: 3px; }
  .roadmap-step__weeks { font-size: var(--t-sm); color: var(--c-course); font-weight: 600; margin-bottom: 6px; }
  .roadmap-step__desc { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.65; }

  /* ══════════════════════════════════════
     15. INSTRUCTORS
  ══════════════════════════════════════ */
  .instructor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 24px; }
  .instructor-card { background: var(--c-bg-2); border-radius: 16px; padding: 26px 22px; display: flex; gap: 18px; align-items: flex-start; }
  .instructor-avatar { position: relative; width: 60px; height: 60px; border-radius: 50%; background: var(--c-black); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; flex-shrink: 0; overflow: visible; }
  .instructor-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; overflow: hidden; }
  .inst-photo-btn { position: absolute; bottom: -2px; right: -2px; width: 22px; height: 22px; border-radius: 50%; background: #3B82F6; color: #fff; border: 2px solid #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; z-index: 1; }
  .instructor-name { font-size: var(--t-lg); font-weight: 700; margin-bottom: 3px; }
  .instructor-specialty { font-size: var(--t-sm); color: var(--c-text-2); font-weight: 600; margin-bottom: 10px; background: var(--c-bg); display: inline-block; padding: 2px 10px; border-radius: 20px; border: 1px solid var(--c-border); }
  .instructor-career { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.7; white-space: pre-line; }

  /* ══════════════════════════════════════
     16. REVIEWS v2
  ══════════════════════════════════════ */
  .review-banner { margin-bottom: 20px; }
  .review-banner__headline { font-size: var(--t-xl); font-weight: 800; letter-spacing: -.03em; line-height: 1.35; margin-bottom: 6px; }
  .review-banner__sub { font-size: var(--t-sm); color: var(--c-text-2); margin-bottom: 14px; }
  .review-banner__chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .review-banner__chip { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 100px; background: var(--c-bg-2); border: 1px solid var(--c-border); font-size: var(--t-sm); font-weight: 600; color: var(--c-text); }

  .review-grid-v2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .review-card-v2 {
    background: #fff; border: 1px solid var(--c-border); border-radius: 18px;
    padding: 22px 22px 18px; display: flex; flex-direction: column; gap: 12px;
    position: relative; overflow: hidden;
    transition: box-shadow 220ms, transform 220ms;
  }
  .review-card-v2:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.09); transform: translateY(-2px); }
  .review-card-v2::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: var(--rv-accent, #3B82F6);
  }
  .review-card-v2__deco {
    position: absolute; top: 12px; right: 18px;
    font-size: 3.6rem; line-height: 1;
    color: var(--rv-accent, #3B82F6); opacity: .07;
    font-family: Georgia, serif; pointer-events: none; user-select: none;
  }
  .review-card-v2__head { display: flex; align-items: center; gap: 11px; }
  .review-avatar-v2 {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--rv-accent, #3B82F6); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem; font-weight: 800; flex-shrink: 0;
  }
  .review-card-v2__name { font-size: var(--t-sm); font-weight: 700; margin-bottom: 4px; }
  .review-card-v2__tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .rv-tag-course {
    font-size: 10px; font-weight: 600; color: var(--c-text-2);
    background: var(--c-bg-2); border: 1px solid var(--c-border);
    padding: 2px 7px; border-radius: 20px;
  }
  .rv-tag-pass {
    font-size: 10px; font-weight: 700; color: #15803d;
    background: #f0fdf4; border: 1px solid #86efac;
    padding: 2px 7px; border-radius: 20px;
  }
  .review-card-v2__text { font-size: var(--t-sm); color: var(--c-text); line-height: 1.82; flex: 1; }
  .review-card-v2__foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .rv-stars { color: #FBBF24; font-size: .78rem; letter-spacing: 1.5px; }
  .rv-date  { font-size: 11px; color: var(--c-text-3); }

  .review-ghost {
    background: var(--c-bg-2); border: 1px dashed var(--c-border);
    border-radius: 18px; height: 110px; opacity: 0.45;
  }
  .review-more-label {
    grid-column: 1 / -1; text-align: center;
    padding: 4px 0 2px;
    font-size: var(--t-sm); color: var(--c-text-3);
    letter-spacing: .12em; font-weight: 500;
  }

  @media (max-width: 680px) { .review-grid-v2 { grid-template-columns: 1fr; } .review-ghost { display: none; } }

  /* ══════════════════════════════════════
     17. IMAGE GALLERY & LIGHTBOX
  ══════════════════════════════════════ */
  .img-gallery { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 16px; margin-bottom: 8px; scroll-snap-type: x mandatory; scrollbar-width: thin; }
  .img-gallery::-webkit-scrollbar { height: 3px; }
  .img-gallery::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 2px; }
  .img-gallery__item { flex-shrink: 0; width: 190px; height: 130px; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; scroll-snap-align: start; border: 1px solid var(--c-border); }
  .img-gallery__item img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; }
  .img-gallery__item:hover img { transform: scale(1.04); }
  .img-gallery__del { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: .7rem; display: flex; align-items: center; justify-content: center; }
  .img-gallery__add { flex-shrink: 0; width: 120px; height: 130px; border-radius: 12px; border: 2px dashed var(--c-border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--c-text-2); font-size: var(--t-sm); background: none; scroll-snap-align: start; }
  .img-gallery__add:hover { border-color: var(--c-text-2); }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 500; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
  .lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 10px; pointer-events: none; }
  .lightbox__close { position: absolute; top: 18px; right: 22px; color: #fff; font-size: 2rem; background: none; border: none; cursor: pointer; line-height: 1; }

  @media (max-width: 680px) {
    .instructor-grid { grid-template-columns: 1fr; }
    .review-grid { grid-template-columns: 1fr; }
  }

  /* ══════════════════════════════════════
     18. ADMIN — 툴바
  ══════════════════════════════════════ */
  .admin-toolbar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: #111;
    color: #fff;
    padding: 0 20px;
    height: 52px;
    gap: 8px;
    align-items: center;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
  }
  .admin-tb-btn {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: background 150ms;
    white-space: nowrap;
    line-height: 1;
  }
  .btn-edit-mode { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-edit-mode:hover { background: rgba(255,255,255,0.18); }
  .btn-edit-mode.is-on { background: #3B82F6; }
  .btn-save { background: #22c55e; color: #fff; }
  .btn-save:hover { background: #16a34a; }
  .btn-logout { background: transparent; color: rgba(255,255,255,0.4); margin-left: auto; }
  .btn-logout:hover { color: #fff; }
  .admin-tb-status { font-size: 0.72rem; color: rgba(255,255,255,0.35); }

  /* ══════════════════════════════════════
     15. ADMIN — 편집 모드
  ══════════════════════════════════════ */
  .admin-editable {
    display: inline;
    min-width: 8px;
  }
  .app.admin-edit .admin-editable {
    outline: 1.5px dashed rgba(59,130,246,0.55);
    outline-offset: 2px;
    border-radius: 3px;
    cursor: text;
  }
  .app.admin-edit .admin-editable:focus {
    outline: 2px solid #3B82F6;
    background: rgba(59,130,246,0.04);
  }

  /* Delete button (inline ✕) */
  .admin-del-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #EF4444;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    vertical-align: middle;
    line-height: 1;
    transition: background 120ms;
  }
  .admin-del-btn:hover { background: #dc2626; }

  /* Floating delete button (for cards, positioned top-right) */
  .admin-del-float {
    position: absolute;
    top: 10px; right: 10px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(239,68,68,0.9);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: background 120ms;
  }
  .admin-del-float:hover { background: #dc2626; }

  /* Add button (pill dashed) */
  .admin-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 99px;
    background: transparent;
    color: #3B82F6;
    font-size: 0.78rem;
    font-weight: 700;
    border: 1.5px dashed rgba(59,130,246,0.6);
    cursor: pointer;
    white-space: nowrap;
    transition: background 150ms;
    vertical-align: middle;
  }
  .admin-add-btn:hover { background: rgba(59,130,246,0.08); }

  /* Wide add button (full width, for blocks) */
  .admin-add-block {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: 1.5px dashed rgba(59,130,246,0.45);
    border-radius: 14px;
    background: rgba(59,130,246,0.03);
    color: #3B82F6;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: background 150ms;
  }
  .admin-add-block:hover { background: rgba(59,130,246,0.08); }

  /* Course delete button */
  .admin-course-del {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 8px;
    background: rgba(239,68,68,0.08);
    color: #EF4444;
    font-size: 0.75rem;
    font-weight: 700;
    border: 1px solid rgba(239,68,68,0.3);
    cursor: pointer;
    transition: background 150ms;
  }
  .admin-course-del:hover { background: rgba(239,68,68,0.15); }

  /* Add course button in sub-nav */
  .admin-add-course-btn {
    padding: 9px 16px;
    border-radius: 99px;
    font-size: 0.78rem;
    font-weight: 700;
    color: #3B82F6;
    border: 1.5px dashed rgba(59,130,246,0.6);
    background: transparent;
    cursor: pointer;
    white-space: nowrap;
    min-height: 40px;
    transition: background 150ms;
    flex-shrink: 0;
  }
  .admin-add-course-btn:hover { background: rgba(59,130,246,0.07); }

  /* Inline row for editable + del */
  .admin-inline-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    vertical-align: middle;
  }

  /* ══════════════════════════════════════
     16. TOAST
  ══════════════════════════════════════ */
  .toast {
    position: fixed;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #111;
    color: #fff;
    padding: 11px 22px;
    border-radius: 99px;
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    z-index: 600;
    opacity: 0;
    transition: opacity 200ms, transform 200ms;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #EF4444; }
  </style>
</head>
<body>

<div class="app" id="app">

  <!-- ══ HEADER ══ -->
  <header class="header">
    <div class="header__logo">
      SBS아카데미
      <span>컴퓨터아트학원</span>
    </div>
    <nav class="main-nav" role="tablist">
      <button class="main-nav__btn is-active" data-page="intro"        role="tab"><span class="dot"></span>학원 소개</button>
      <button class="main-nav__btn"           data-page="roadmap"      role="tab"><span class="dot"></span>학과별 로드맵</button>
      <button class="main-nav__btn"           data-page="curriculum"   role="tab"><span class="dot"></span>커리큘럼</button>
      <button class="main-nav__btn"           data-page="instructors"  role="tab"><span class="dot"></span>강사 소개</button>
      <button class="main-nav__btn"           data-page="reviews"      role="tab"><span class="dot"></span>수강생 후기</button>
      <button class="main-nav__btn"           data-page="checklist"    role="tab"><span class="dot"></span>준비물 안내</button>
    </nav>
    <!-- 2초 길게 누르면 관리자 로그인 -->
    <div class="header__indicator" id="indicator" title="">1 / 6</div>
  </header>

  <!-- ══ CONTENT ══ -->
  <div class="content-area">

    <!-- ── PAGE 1: 학원 소개 (동적 렌더링) ── -->
    <div class="page is-active" id="page-intro">
      <div class="page__inner" id="intro-content"></div>
    </div>

    <!-- ── PAGE 2: 학과별 로드맵 ── -->
    <div class="page" id="page-roadmap">
      <div class="page__inner">
        <p class="page-label">학과별 로드맵</p>
        <nav class="sub-nav" id="roadmap-subnav"></nav>
        <div id="roadmap-views"></div>
      </div>
    </div>

    <!-- ── PAGE 3: 커리큘럼 ── -->
    <div class="page" id="page-curriculum">
      <div class="page__inner">
        <p class="page-label">커리큘럼(학과별)</p>
        <nav class="sub-nav" id="curr-subnav"></nav>
        <div id="curr-views"></div>
      </div>
    </div>

    <!-- ── PAGE 4: 강사 소개 ── -->
    <div class="page" id="page-instructors">
      <div class="page__inner" id="instructors-content"></div>
    </div>

    <!-- ── PAGE 5: 수강생 후기 ── -->
    <div class="page" id="page-reviews">
      <div class="page__inner" id="reviews-content"></div>
    </div>

    <!-- ── PAGE 6: 준비물 및 수강생 안내 ── -->
    <div class="page" id="page-checklist">
      <div class="page__inner">
        <p class="page-label">준비물 및 수강생 안내</p>
        <nav class="sub-nav" id="checklist-subnav"></nav>
        <div id="checklist-views"></div>
      </div>
    </div>

  </div><!-- .content-area -->
</div><!-- .app -->

<!-- ══ 관리자 로그인 모달 ══ -->
<div id="login-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>🔒 관리자 로그인</h3>
    <input type="password" id="admin-pw" placeholder="비밀번호 입력"
           onkeydown="if(event.key==='Enter')submitLogin()">
    <p id="login-error" class="modal-error">비밀번호가 올바르지 않습니다.</p>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel"  onclick="cancelLogin()">취소</button>
      <button class="modal-btn modal-btn-confirm" onclick="submitLogin()">로그인</button>
    </div>
  </div>

function logoUrl(slug) {
  if (!slug) return '';
  if (LOGO_DATA[slug]) return LOGO_DATA[slug];
  if (slug.startsWith('iconify:')) {
    const rest = slug.slice(8);
    const col  = rest.split(':')[0];
    const icon = rest.split(':')[1];
    return `https://api.iconify.design//.svg?color=%23888`;
  }
  return `https://cdn.jsdelivr.net/npm/simple-icons@11/icons/.svg`;
}

function linkify(text) {
  if (!text) return text;
  return text.replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(?:\/[^\s<]*)?)/g, url => {
    if (url.includes('@') || !url.includes('.')) return url;
    const href = /^https?:\/\//.test(url) ? url : `https://${url}`;
    return `<a href="${href}" target="_blank" rel="noopener" style="color:var(--c-course);text-decoration:underline;word-break:break-all">${url}</a>`;
  });
}

let isAdmin    = false;
let isEditMode = false;
let currentPage   = 'intro';
let currentCourse = 'web';
let db      = null;
let storage = null;

/* ══════════════════════════════════════════════════
   PATH HELPERS
══════════════════════════════════════════════════ */
function setByPath(path, value) {
  const parts = path.split('.');
  const root  = parts[0];
  const keys  = parts.slice(1);
  let curr;
  if (root === 'ui')          curr = UI_DATA;
  else if (root === 'instructors') curr = INSTRUCTORS_DATA;
  else if (root === 'reviews')     curr = REVIEWS_DATA;
  else                             curr = COURSES;
  for (let i = 0; i < keys.length - 1; i++) {
    const k = keys[i];
    curr = curr[isNaN(k) ? k : +k];
    if (curr == null) return;
  }
  const last = keys[keys.length - 1];
  curr[isNaN(last) ? last : +last] = value;
}

function maskName(name) {
  if (!name) return name;
  return name.charAt(0) + '○'.repeat(Math.min(name.length - 1, 2));
}

/* Editable span helper — wraps text in contenteditable only in edit mode */
function E(path, text) {
  if (!isEditMode) return String(text);
  const safe = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span contenteditable="true" data-path="${path}" class="admin-editable">${safe}</span>`;
}

/* ══════════════════════════════════════════════════
   FIREBASE
══════════════════════════════════════════════════ */
const FB_READY = !FIREBASE_CONFIG.apiKey.startsWith('여기에');

async function initFirebase() {
  if (!FB_READY) { console.info('Firebase 미설정 — 오프라인 모드로 실행 중'); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    await loadFromFirestore();
    // Storage는 관리자 모드(업로드)에서만 필요 — 동적 로드
    loadStorageSDK();
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e.message);
  }
}

function loadStorageSDK() {
  if (typeof firebase === 'undefined' || storage) return;
  const s = document.createElement('script');
  s.src = 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js';
  s.onload = () => { try { storage = firebase.storage(); } catch(e) {} };
  document.head.appendChild(s);
}

async function loadFromFirestore() {
  if (!db) return;
  try {
    const snap = await db.collection('curriculum').doc('main').get();
    if (snap.exists) {
      const data = snap.data();
      if (data.courses && Object.keys(data.courses).length) COURSES = data.courses;
      if (data.ui)          UI_DATA          = data.ui;
      if (data.instructors) INSTRUCTORS_DATA = data.instructors;
      if (data.reviews)     REVIEWS_DATA     = data.reviews;
    }
  } catch(e) {
    console.warn('데이터 로드 실패, 기본값 사용:', e.message);
  }
}

async function saveData() {
  if (!db) {
    showToast('Firebase 미연결 — FIREBASE_CONFIG 설정 필요', 'error');
    return;
  }
  try {
    await db.collection('curriculum').doc('main').set({
      courses:     COURSES,
      ui:          UI_DATA,
      instructors: INSTRUCTORS_DATA,
      reviews:     REVIEWS_DATA,
      updatedAt:   new Date().toISOString()
    });
    showToast('저장되었습니다 ✓');
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
    console.error(e);
  }
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type ? ' ' + type : '');
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ══════════════════════════════════════════════════
   ADMIN AUTH
══════════════════════════════════════════════════ */
let _holdTimer;

function initAdminTrigger() {
  const ind = document.getElementById('indicator');
  ind.addEventListener('pointerdown', () => {
    _holdTimer = setTimeout(showLoginModal, 2000);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev =>
    ind.addEventListener(ev, () => clearTimeout(_holdTimer))
  );
  if (sessionStorage.getItem('admin') === '1') {
    isAdmin = true;
    showAdminUI();
  }
}

function showLoginModal() {
  if (isAdmin) return;
  document.getElementById('login-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw').focus(), 60);
}

function submitLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    sessionStorage.setItem('admin', '1');
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('admin-pw').value = '';
    document.getElementById('login-error').style.display = 'none';
    showAdminUI();
    showToast('관리자로 로그인됨');
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-pw').focus();
  }
}

function cancelLogin() {
  document.getElementById('login-modal').style.display = 'none';
  document.getElementById('admin-pw').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function showAdminUI() {
  document.getElementById('admin-toolbar').style.display = 'flex';
  appEl.classList.add('is-admin');
}

function adminLogout() {
  isAdmin    = false;
  isEditMode = false;
  sessionStorage.removeItem('admin');
  document.getElementById('admin-toolbar').style.display = 'none';
  appEl.classList.remove('is-admin','admin-edit');
  document.getElementById('edit-btn').classList.remove('is-on');
  document.getElementById('edit-btn').textContent = '✏️ 편집 모드';
  document.getElementById('admin-status').textContent = '';
  renderAll();
  renderUI();
}

/* ══════════════════════════════════════════════════
   EDIT MODE TOGGLE
══════════════════════════════════════════════════ */
function toggleEditMode() {
  isEditMode = !isEditMode;
  appEl.classList.toggle('admin-edit', isEditMode);
  const btn = document.getElementById('edit-btn');
  btn.classList.toggle('is-on', isEditMode);
  btn.textContent = isEditMode ? '👁 미리보기' : '✏️ 편집 모드';
  document.getElementById('admin-status').textContent = isEditMode ? '— 텍스트 클릭 후 수정' : '';
  renderUI();
  renderAll();
  activateCoursePanels(currentCourse);
}

   RENDER: 학원 소개 (intro page)
══════════════════════════════════════════════════ */
function renderUI() {
  const d  = UI_DATA;
  const em = isEditMode;

  const stats = d.stats.map((s, i) => `
    <div class="stat-card">
      <span class="stat-num">${E('ui.stats.'+i+'.num',   s.num)}</span>
      <span class="stat-lbl">${E('ui.stats.'+i+'.label', s.label)}</span>
    </div>`).join('');

  const features = d.features.map((f, i) => `
    <article class="feature-card">
      ${em ? `<button class="admin-del-float" onclick="deleteFeature(${i})" title="카드 삭제">✕</button>` : ''}
      <div class="feature-card__icon-wrap">${E('ui.features.'+i+'.icon', f.icon)}</div>
      <div class="feature-card__body">
        <h3 class="feature-card__title">${E('ui.features.'+i+'.title', f.title)}</h3>
        <p  class="feature-card__desc">${E('ui.features.'+i+'.desc',   f.desc)}</p>
      </div>
    </article>`).join('');

  const badges = d.badges.map((b, i) => `
    <span class="badge">
      ${em
        ? `<span class="admin-inline-row">${E('ui.badges.'+i, b)}<button class="admin-del-btn" onclick="deleteBadge(${i})" title="삭제">✕</button></span>`
        : b
      }
    </span>`).join('');

  document.getElementById('intro-content').innerHTML = `
    <p class="page-label">학원 소개</p>
    <h1 class="hero-title">
      ${E('ui.hero.line1', d.hero.line1)}<br>
      <em>${E('ui.hero.emphasis', d.hero.emphasis)}</em>${E('ui.hero.line2', d.hero.line2)}
    </h1>
    <p class="hero-sub">${E('ui.hero.sub', d.hero.sub)}</p>
    <div class="stat-row">${stats}</div>
    <div class="feature-grid">
      ${features}
      ${em ? '<button class="admin-add-block" onclick="addFeature()">+ 특징 카드 추가</button>' : ''}
    </div>
    <div class="badge-row">
      ${badges}
      ${em ? '<button class="admin-add-btn" onclick="addBadge()">+ 배지 추가</button>' : ''}
    </div>`;
}

function renderSubNavs() {
  const ids    = Object.keys(COURSES);

  const btns   = ids.map(id => `<button class="sub-nav__btn" data-course="${id}">${COURSES[id].label}</button>`).join('') + addBtn;
  document.getElementById('roadmap-subnav').innerHTML    = btns;
  document.getElementById('curr-subnav').innerHTML       = btns;
  document.getElementById('checklist-subnav').innerHTML  = btns;
}

/* ══════════════════════════════════════════════════
   RENDER: 커리큘럼 패널 (1개)
══════════════════════════════════════════════════ */
function renderCurriculumView(id) {
  const c  = COURSES[id];
  const em = isEditMode;

  let el = document.getElementById('cr-'+id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'cr-'+id;
    el.className = 'course-view';
    document.getElementById('curr-views').appendChild(el);
  }

  const weeks = c.curriculum.map((item, wi) => {
    // #4 Bold/Light: split at ' · ' + 계층형 마커 지원 (## Week, # Topic)
    const items = item.items.map((it, ii) => {
      if (!em && it.startsWith('## ')) {
        return `<li class="curr-week-hd">${it.slice(3)}</li>`;
      }
      if (!em && it.startsWith('# ')) {
        return `<li class="curr-topic-hd">▸ ${it.slice(2)}</li>`;
      }
      const sepIdx = it.indexOf(' · ');
      const label  = sepIdx >= 0 ? it.slice(0, sepIdx) : it;
      const detail = sepIdx >= 0 ? it.slice(sepIdx) : '';
      const textHtml = em
        ? `<span class="admin-inline-row">${E('courses.'+id+'.curriculum.'+wi+'.items.'+ii, it)}<button class="admin-del-btn" onclick="deleteCurrItem('${id}',${wi},${ii})">✕</button></span>`
        : `<strong>${linkify(label)}</strong>${detail ? `<span class="item-detail">${linkify(detail)}</span>` : ''}`;
      const cls = (!em && item.items.some(x => x.startsWith('## ') || x.startsWith('# '))) ? ' class="curr-sub-item"' : '';
      return `<li${cls}>${textHtml}</li>`;
    }).join('');

    // #3 Difficulty stars
    const diff = item.difficulty !== undefined ? item.difficulty : (DIFFICULTY_MAP[item.week] || 3);
    const starsHtml = Array.from({length: 5}, (_, i) =>
      `<span class="${i < diff ? 's-on' : 's-off'}">${i < diff ? '★' : '☆'}</span>`
    ).join('');
    const diffEl = em
      ? `<span class="diff-stars editable" title="난이도 ${diff}/5">${starsHtml}</span>`
      : `<span class="diff-stars" title="난이도 ${diff}/5">${starsHtml}</span>`;

    // #2 Logo row
    const logoSlugs = (item.logos && item.logos.length > 0) ? item.logos
      : (AUTO_LOGO_MAP[item.week] ? [AUTO_LOGO_MAP[item.week]] : []);
    const logoImgs = logoSlugs.map((slug, li) => {
      const delBtn = em ? `<button class="logo-del-btn" onclick="event.stopPropagation();removeLogo('${id}',${wi},${li})">✕</button>` : '';
      const preset = LOGO_PRESETS.find(p => p.slug === slug);
      const label  = preset?.label || preset?.name || slug;
      return `<span class="logo-badge"><img src="${logoUrl(slug)}" width="15" height="15" onerror="this.parentNode.innerHTML='<span class=logo-badge__text>${label}</span>'">${delBtn}</span>`;
    }).join('');
    const addLogoBtn = em ? `<button class="logo-add-btn" onclick="event.stopPropagation();openLogoPopover('${id}',${wi},this)">+ 로고</button>` : '';
    const logoRowEl = (logoImgs || addLogoBtn) ? `<span class="logo-row">${logoImgs}${addLogoBtn}</span>` : '';

    // 선수강과목
    const prereqs = item.prereqs || [];
    const prereqChips = prereqs.map((p, pi) =>
      `<span class="prereq-chip">${p}${em ? `<button onclick="removePrereq('${id}',${wi},${pi})">✕</button>` : ''}</span>`
    ).join('');
    const prereqRow = (prereqs.length > 0 || em) ? `
      <div class="prereq-row">
        <span class="prereq-label">선수강:</span>
        ${prereqChips}
        ${em ? `<button class="logo-add-btn" onclick="addPrereq('${id}',${wi})">+ 선수강 추가</button>` : ''}
      </div>` : '';

    const wImgs = (item.images || []);
    const wGalleryItems = wImgs.map((url, ii) => `
      <div class="img-gallery__item" onclick="openLightbox('${url}')">
        <img src="${url}" alt="이미지 ${ii+1}" loading="lazy">
        ${em ? `<button class="img-gallery__del" onclick="event.stopPropagation();deleteImage('${id}',${wi},${ii})">✕</button>` : ''}
      </div>`).join('');
    const wGallery = (wImgs.length > 0 || em) ? `
      <div class="img-gallery" style="margin-top:14px">
        ${wGalleryItems}
        ${em ? `<button class="img-gallery__add" onclick="addImage('${id}',${wi})">+ 이미지<br>추가</button>` : ''}
      </div>` : '';

    return `
      <div class="accordion" ${em ? `draggable="true" data-cid="${id}" data-wi="${wi}"` : ''}>
        <div class="accordion__head">
          ${em ? `<span class="drag-handle" title="드래그로 순서 변경">⠿</span>` : ''}
          <button class="accordion__trigger" aria-expanded="false">
            <span class="accordion__num">${wi+1}</span>
            <span class="accordion__week">${em ? E('courses.'+id+'.curriculum.'+wi+'.week', item.week) : item.week}</span>
            ${logoRowEl}
            <span class="accordion__topic">${em ? E('courses.'+id+'.curriculum.'+wi+'.topic', item.topic) : item.topic}</span>
            ${diffEl}
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
          ${em ? `<button class="admin-del-btn" onclick="deleteCurrWeek('${id}',${wi})" title="주차 삭제" style="margin-right:8px">✕</button>` : ''}
        </div>
        ${prereqRow}
        <div class="accordion__body">
          <div class="accordion__inner">
            <ul class="topic-list">${items}</ul>
            ${em ? `<div style="margin-top:10px"><button class="admin-add-btn" onclick="addCurrItem('${id}',${wi})">+ 항목 추가</button></div>` : ''}
            ${wGallery}
          </div>
        </div>
      </div>`;
  }).join('');

  // 재렌더 전에 활성 탭 기억
  const pfWasActive = document.getElementById('ct-pf-'+id)?.classList.contains('is-hidden') === false;

  if (!c.portfolio) c.portfolio = [];
  const portfolioItems = c.portfolio.map((entry, idx) => {
    const ytId = typeof entry === 'string' && entry.startsWith('youtube:') ? entry.slice(8) : null;
    if (ytId) {
      const embedSrc = `https://www.youtube.com/embed/${ytId}?loop=1&playlist=${ytId}&rel=0&modestbranding=1`;
      return `<div class="portfolio-item portfolio-item--video">
        <iframe src="${embedSrc}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>
        ${em ? `<button class="portfolio-del-btn" onclick="event.stopPropagation();deletePortfolioImage('${id}',${idx})">✕</button>` : ''}
      </div>`;
    }
    const url = typeof entry === 'string' ? entry : entry.url;
    return `<div class="portfolio-item" onclick="openLightbox('${url}')">
      <img src="${url}" loading="lazy">
      ${em ? `<button class="portfolio-del-btn" onclick="event.stopPropagation();deletePortfolioImage('${id}',${idx})">✕</button>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="curr-header">
      <h2 class="curr-header__title">${c.label}</h2>
      <div class="curr-header__meta">${c.duration}</div>
    </div>
    <div class="curr-view-tabs">
      <button class="curr-tab-btn${pfWasActive ? '' : ' is-active'}" onclick="switchCurrTab('${id}','curriculum')">커리큘럼</button>
      <button class="curr-tab-btn${pfWasActive ? ' is-active' : ''}" onclick="switchCurrTab('${id}','portfolio')">포트폴리오</button>
    </div>
    <div class="curr-tab-panel${pfWasActive ? ' is-hidden' : ''}" id="ct-curr-${id}">
      ${weeks}
      ${em ? `<button class="admin-add-block" onclick="addCurrWeek('${id}')">+ 주차 추가</button>` : ''}
    </div>
    <div class="curr-tab-panel${pfWasActive ? '' : ' is-hidden'}" id="ct-pf-${id}">
      <div class="portfolio-grid">${portfolioItems || '<p class="portfolio-empty">포트폴리오 이미지가 없습니다</p>'}</div>
      ${em ? `<div style="display:flex;gap:8px;margin:4px 16px 16px">
        <button class="portfolio-add-btn" style="margin:0;flex:1" onclick="uploadPortfolioImage('${id}')">+ 이미지 추가</button>
        <button class="portfolio-add-btn" style="margin:0;flex:1" onclick="addPortfolioVideo('${id}')">▶ 유튜브 추가</button>
      </div>` : ''}
    </div>`;
}

  renderSubNavs();

  // 삭제된 강좌 뷰 제거
  ['curr-views','roadmap-views'].forEach(wrapperId => {
    document.querySelectorAll('#'+wrapperId+' > .course-view').forEach(v => {
      const vid = v.id.replace(/^(cv|cr|rm)-/, '');

    });
  });
  document.querySelectorAll('#checklist-views > [id^="cl-"]').forEach(v => {

/* ══════════════════════════════════════════════════
   COLOR SYSTEM
══════════════════════════════════════════════════ */
function setCourseColor(courseId) {
  PALETTE_KEYS.forEach(k => appEl.classList.remove('c-'+k));
  if (!courseId) return;
  const ck = COURSES[courseId]?.colorKey || courseId;
  appEl.classList.add('c-' + (PALETTE_KEYS.includes(ck) ? ck : 'web'));
}

/* ══════════════════════════════════════════════════
   COURSE PANEL ACTIVATION
══════════════════════════════════════════════════ */
function activateCoursePanels(courseId) {
  const ids = Object.keys(COURSES);
  if (!COURSES[courseId]) courseId = ids[0];
  if (!courseId) return;

  document.querySelectorAll('.sub-nav__btn').forEach(b =>
    b.classList.toggle('is-active', b.dataset.course === courseId));

  document.querySelectorAll('#roadmap-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'rm-'+courseId));
  document.querySelectorAll('#curr-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'cr-'+courseId));
  document.querySelectorAll('#checklist-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'cl-'+courseId));

  setCourseColor(courseId);
  currentCourse = courseId;
}

/* ══════════════════════════════════════════════════
   PAGE SWITCHING
══════════════════════════════════════════════════ */
const PAGE_ORDER = ['intro','roadmap','curriculum','instructors','reviews','checklist'];

function goToPage(pageId) {
  if (pageId === currentPage) return;
  const outEl = document.getElementById('page-'+currentPage);
  const inEl  = document.getElementById('page-'+pageId);
  outEl.classList.add('exit');
  outEl.classList.remove('is-active');
  setTimeout(() => outEl.classList.remove('exit'), 200);
  inEl.classList.add('is-active');
  inEl.scrollTop = 0;
  document.querySelectorAll('.main-nav__btn').forEach(btn =>
    btn.classList.toggle('is-active', btn.dataset.page === pageId));
  document.getElementById('indicator').textContent =
    `${PAGE_ORDER.indexOf(pageId)+1} / ${PAGE_ORDER.length}`;
  if (['intro','instructors','reviews'].includes(pageId)) setCourseColor(null);
  currentPage = pageId;
}

/* ══════════════════════════════════════════════════
   GLOBAL EVENT DELEGATION
══════════════════════════════════════════════════ */
// Blur (capture) — editable field 반영
document.addEventListener('blur', e => {
  if (!isEditMode) return;
  const el = e.target;
  if (!el.dataset.path) return;
  setByPath(el.dataset.path, el.innerText.trim());
}, true);

// Click — main-nav / sub-nav / accordion
document.addEventListener('click', e => {
  // Main nav
  const mainBtn = e.target.closest('.main-nav__btn');
  if (mainBtn?.dataset.page) { goToPage(mainBtn.dataset.page); return; }

  // Sub-nav
  const subBtn = e.target.closest('.sub-nav__btn');
  if (subBtn?.dataset.course) { activateCoursePanels(subBtn.dataset.course); return; }

  // Difficulty star click (edit mode)
  const starEl = e.target.closest('.diff-stars.editable');
  if (starEl) {
    const trigger = starEl.closest('.accordion__trigger');
    const accordion = trigger?.closest('.accordion');
    const head = accordion?.closest('[data-curr-id]') || document.getElementById('curr-views');
    const stars = starEl.querySelectorAll('span');
    const idx = Array.from(stars).findIndex(s => s === e.target);
    if (idx >= 0) {
      // find id and wi from data attributes on the parent accordion
      const acc = starEl.closest('.accordion');
      const allAccordions = Array.from(acc?.closest('.course-view')?.querySelectorAll('.accordion') || []);
      const wi = allAccordions.indexOf(acc);
      const viewEl = acc?.closest('.course-view');
      const vid = viewEl?.id?.replace('cr-', '');
      if (vid && wi >= 0) setCurrDifficulty(vid, wi, idx + 1);
    }
    return;
  }

  // Accordion trigger (admin/logo/drag 버튼 제외)
  const trigger = e.target.closest('.accordion__trigger');
  if (trigger && !e.target.closest('.admin-del-btn') && !e.target.closest('.logo-add-btn') && !e.target.closest('.logo-del-btn') && !e.target.closest('.logo-row') && !e.target.closest('.drag-handle')) {
    const accordion = trigger.closest('.accordion');
    const body = accordion?.querySelector('.accordion__body');
    if (!body) return;
    const open = trigger.getAttribute('aria-expanded') === 'true';
    trigger.setAttribute('aria-expanded', String(!open));
    body.style.maxHeight = open ? '0' : body.scrollHeight + 'px';
  }
});

/* ══════════════════════════════════════════════════
   DRAG & DROP — 커리큘럼 순서 변경
══════════════════════════════════════════════════ */
document.addEventListener('dragstart', e => {
  const acc = e.target.closest('.accordion[draggable="true"]');
  if (!acc) return;
  _dragCid = acc.dataset.cid;
  _dragWi  = +acc.dataset.wi;
  acc.classList.add('is-dragging');
  e.dataTransfer.effectAllowed = 'move';
});

document.addEventListener('dragover', e => {
  const acc = e.target.closest('.accordion[draggable="true"]');
  if (!acc || acc.dataset.cid !== _dragCid) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.accordion.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (+acc.dataset.wi !== _dragWi) acc.classList.add('drag-over');
});

document.addEventListener('dragleave', e => {
  const acc = e.target.closest('.accordion');
  if (acc && !acc.contains(e.relatedTarget)) acc.classList.remove('drag-over');
});

document.addEventListener('drop', e => {
  const acc = e.target.closest('.accordion[draggable="true"]');
  if (!acc || _dragCid === null) return;
  e.preventDefault();
  const targetWi = +acc.dataset.wi;
  if (targetWi === _dragWi) return;
  const cur = COURSES[_dragCid].curriculum;
  const [moved] = cur.splice(_dragWi, 1);
  cur.splice(targetWi, 0, moved);
  renderCurriculumView(_dragCid);
  if (currentCourse === _dragCid) document.getElementById('cr-'+_dragCid)?.classList.add('is-active');
  _dragCid = null; _dragWi = null;
});

document.addEventListener('dragend', () => {
  document.querySelectorAll('.accordion.is-dragging, .accordion.drag-over')
    .forEach(el => el.classList.remove('is-dragging', 'drag-over'));
  _dragCid = null; _dragWi = null;
});

/* ══════════════════════════════════════════════════

function closeLogoPopover() {
  if (_activeLogoPopover) { _activeLogoPopover.remove(); _activeLogoPopover = null; }
}
function openLogoPopover(id, wi, btn) {
  closeLogoPopover();
  const rect = btn.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'logo-popover';
  pop.style.top  = (rect.bottom + 6) + 'px';
  pop.style.left = Math.min(rect.left, window.innerWidth - 216) + 'px';
  pop.innerHTML = `
    <input type="text" placeholder="소프트웨어 검색..." oninput="filterLogoPopover(this, '${id}', ${wi})">
    <div class="logo-popover-list" id="lp-list-${id}-${wi}"></div>
    <button class="logo-popover-close" onclick="closeLogoPopover()">완료</button>`;
  document.body.appendChild(pop);
  _activeLogoPopover = pop;
  filterLogoPopover(pop.querySelector('input'), id, wi);
  setTimeout(() => document.addEventListener('click', function _close(e) {
    if (!pop.contains(e.target) && !e.target.closest('.logo-add-btn')) {
      closeLogoPopover(); document.removeEventListener('click', _close);
    }
  }), 50);
}
function filterLogoPopover(input, id, wi) {
  const q        = input.value.toLowerCase();
  const list     = document.getElementById(`lp-list-${id}-${wi}`);
  if (!list) return;
  const selected = COURSES[id]?.curriculum[wi]?.logos || [];
  const filtered = q ? LOGO_PRESETS.filter(p => p.name.toLowerCase().includes(q)) : LOGO_PRESETS;
  list.innerHTML = filtered.map(p => {
    const isSel = selected.includes(p.slug);
    return `<div class="logo-popover-item${isSel ? ' is-selected' : ''}" onclick="toggleLogo('${id}',${wi},'${p.slug}',this)">
      <img src="${logoUrl(p.slug)}" style="filter:grayscale(1)opacity(.6)" onerror="this.style.display='none'" width="14" height="14">
      ${p.name}
    </div>`;
  }).join('');
}
function toggleLogo(id, wi, slug, el) {
  if (!COURSES[id].curriculum[wi].logos) COURSES[id].curriculum[wi].logos = [];
  const logos = COURSES[id].curriculum[wi].logos;
  const idx = logos.indexOf(slug);
  if (idx >= 0) {
    logos.splice(idx, 1);
    el.classList.remove('is-selected');
  } else {
    logos.push(slug);
    el.classList.add('is-selected');
  }
  renderCurriculumView(id);
  if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
  // 팝오버는 닫지 않음 — 다중선택 가능
}
function addLogo(id, wi, slug) {
  if (!COURSES[id].curriculum[wi].logos) COURSES[id].curriculum[wi].logos = [];
  if (!COURSES[id].curriculum[wi].logos.includes(slug)) {
    COURSES[id].curriculum[wi].logos.push(slug);
    renderCurriculumView(id);
    if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
  }
}

function switchCurrTab(id, tab) {
  const currPanel = document.getElementById('ct-curr-'+id);
  const pfPanel   = document.getElementById('ct-pf-'+id);
  const btns = document.querySelectorAll('#cr-'+id+' .curr-tab-btn');
  if (!currPanel || !pfPanel) return;
  const isCurr = tab === 'curriculum';
  currPanel.classList.toggle('is-hidden', !isCurr);
  pfPanel.classList.toggle('is-hidden', isCurr);
  btns.forEach((b, i) => b.classList.toggle('is-active', isCurr ? i === 0 : i === 1));
}
function uploadPortfolioImage(id) {
  if (!storage) { loadStorageSDK(); showToast('Storage 로드 중, 잠시 후 다시 시도해주세요', 'error'); return; }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    showToast(`${files.length}개 업로드 중...`);
    if (!COURSES[id].portfolio) COURSES[id].portfolio = [];
    for (const file of files) {
      try {
        const ref = storage.ref(`portfolio/${id}/${Date.now()}_${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        COURSES[id].portfolio.push(url);
      } catch(err) { showToast('업로드 실패: ' + err.message, 'error'); return; }
    }
    renderCurriculumView(id);
    switchCurrTab(id, 'portfolio');
    if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
    showToast('업로드 완료 ✓');
  };
  input.click();
}
function deletePortfolioImage(id, idx) {
  COURSES[id].portfolio.splice(idx, 1);
  renderCurriculumView(id);
  switchCurrTab(id, 'portfolio');
  if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
}
function addPortfolioVideo(id) {
  const input = prompt('YouTube URL을 입력하세요:\n(예: https://youtu.be/abc123 또는 https://www.youtube.com/watch?v=abc123)');
  if (!input?.trim()) return;
  const match = input.match(/(?:youtu\.be\/|watch\?v=|embed\/)([A-Za-z0-9_-]{11})/);
  if (!match) { showToast('유효한 YouTube URL이 아닙니다', 'error'); return; }
  if (!COURSES[id].portfolio) COURSES[id].portfolio = [];
  COURSES[id].portfolio.push('youtube:' + match[1]);
  renderCurriculumView(id);
  switchCurrTab(id, 'portfolio');
  if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
  showToast('유튜브 영상 추가 완료 ✓');
}
