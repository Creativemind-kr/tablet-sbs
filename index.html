<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>SBS아카데미컴퓨터아트학원 — 강좌 안내</title>
  <meta name="description" content="시각편집·CG·모션그래픽·웹디자인·프로그래밍·인테리어·자격증 등 전문 디자인 정규과정 안내">
  <!-- Open Graph (카카오톡·SNS 링크 미리보기) -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://tablet-sbs.vercel.app/">
  <meta property="og:site_name"   content="SBS아카데미컴퓨터아트학원">
  <meta property="og:title"       content="SBS아카데미컴퓨터아트학원 — 강좌 안내">
  <meta property="og:description" content="시각편집·CG·모션그래픽·웹디자인·프로그래밍·인테리어·자격증 등 전문 디자인 정규과정 안내">
  <meta property="og:image"       content="https://tablet-sbs.vercel.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F97316">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SBS아카데미">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=optional" rel="stylesheet">
  <!-- Firebase compat CDN — app+firestore는 defer로 조기 로드, storage는 필요 시 동적 로드 -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <style>
  /* ══════════════════════════════════════
     1. TOKENS & COURSE COLOR SYSTEM
  ══════════════════════════════════════ */
  :root {
    --c-bg:           #ffffff;
    --c-bg-2:         #f7f7f5;
    --c-text:         #111111;
    --c-text-2:       #555555;
    --c-text-3:       #aaaaaa;
    --c-border:       #e8e8e8;
    --c-black:        #000000;

    --c-course:       #111111;
    --c-course-tint:  #f7f7f5;

    --font: 'Noto Sans KR', -apple-system, sans-serif;

    --t-xs:   0.72rem;
    --t-sm:   0.85rem;
    --t-md:   1rem;
    --t-lg:   1.15rem;
    --t-xl:   1.4rem;
    --t-2xl:  1.8rem;
    --t-3xl:  2.4rem;
    --t-4xl:  3.2rem;
    --t-hero: 4.8rem;

    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --fast:   130ms;
    --base:   260ms;
  }

  .app.c-web   { --c-course: #3B82F6; --c-course-tint: #EFF6FF; }
  .app.c-ps    { --c-course: #F97316; --c-course-tint: #FFF7ED; }
  .app.c-video { --c-course: #EF4444; --c-course-tint: #FEF2F2; }
  .app.c-uiux  { --c-course: #8B5CF6; --c-course-tint: #F5F3FF; }
  .app.c-ai    { --c-course: #0EA5E9; --c-course-tint: #F0F9FF; }

  /* ══════════════════════════════════════
     2. RESET
  ══════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--c-text);
    background: var(--c-bg);
    -webkit-font-smoothing: antialiased;
  }
  button {
    cursor: pointer; border: none; background: none;
    font: inherit; color: inherit;
    touch-action: manipulation;
  }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }

  /* ══════════════════════════════════════
     3. LAYOUT
  ══════════════════════════════════════ */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ══════════════════════════════════════
     4. HEADER
  ══════════════════════════════════════ */
  .header {
    flex-shrink: 0;
    height: 58px;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 28px;
    background: var(--c-bg);
    position: relative;
    z-index: 10;
  }
  .header__logo {
    font-size: var(--t-sm);
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header__logo span {
    color: var(--c-text-3);
    font-weight: 400;
    margin-left: 6px;
    font-size: var(--t-xs);
  }
  .main-nav {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .main-nav::-webkit-scrollbar { display: none; }
  .main-nav__btn {
    padding: 7px 15px;
    border-radius: 8px;
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--c-text-3);
    white-space: nowrap;
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background var(--fast), color var(--fast);
  }
  .main-nav__btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c-border);
    flex-shrink: 0;
    transition: background var(--base);
  }
  .main-nav__btn:hover { color: var(--c-text); background: var(--c-bg-2); }
  .main-nav__btn.is-active { color: var(--c-text); font-weight: 700; background: var(--c-bg-2); }
  .main-nav__btn.is-active .dot { background: var(--c-course); }

  .header__indicator {
    margin-left: auto;
    font-size: var(--t-xs);
    color: var(--c-text-3);
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
    padding: 8px 4px;
  }

  /* ══════════════════════════════════════
     5. CONTENT AREA & PAGES
  ══════════════════════════════════════ */
  .content-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px) scale(0.99);
    transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    padding: 44px 40px 64px;
  }
  .page.is-active {
    opacity: 1;
    pointer-events: auto;
    transform: none;
  }
  .page.exit {
    opacity: 0;
    transform: translateY(-6px) scale(0.99);
    transition: opacity 150ms, transform 150ms;
  }
  .app.is-admin .page { padding-bottom: 80px; }
  .page__inner { max-width: 860px; margin: 0 auto; }
  .page-label {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 12px;
  }

  /* ══════════════════════════════════════
     6. PAGE 1 — 학원 소개
  ══════════════════════════════════════ */
  .hero-title {
    font-size: var(--t-hero);
    font-weight: 800;
    letter-spacing: -.05em;
    line-height: 1.04;
    margin-bottom: 20px;
  }
  .hero-title em {
    font-style: normal;
    position: relative;
    display: inline-block;
  }
  .hero-title em::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 2px;
    height: 6px;
    background: var(--c-course);
    border-radius: 3px;
    opacity: 0.35;
    transition: background var(--base);
  }
  .hero-sub {
    font-size: var(--t-lg);
    color: var(--c-text-2);
    margin-bottom: 48px;
    font-weight: 400;
  }
  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 52px;
  }
  .stat-card {
    padding: 22px 20px;
    border: 1px solid var(--c-border);
    border-top: 3px solid #1E3461;
    border-radius: 14px;
    background: var(--c-bg-2);
  }
  .stat-num {
    display: block;
    font-size: var(--t-3xl);
    font-weight: 800;
    letter-spacing: -.045em;
    color: #1E3461;
    margin-bottom: 3px;
    line-height: 1;
  }
  .stat-lbl { font-size: var(--t-sm); color: var(--c-text-3); }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .feature-card {
    padding: 26px;
    border: 1px solid var(--c-border);
    border-radius: 18px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    transition: border-color var(--base), box-shadow var(--base);
    position: relative;
  }
  .feature-card:hover {
    border-color: var(--c-course);
    box-shadow: 0 0 0 1px var(--c-course);
  }
  .feature-card__icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--c-course-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    flex-shrink: 0;
    transition: background var(--base);
  }
  .feature-card__title { font-size: var(--t-md); font-weight: 700; margin-bottom: 5px; letter-spacing: -.01em; }
  .feature-card__desc  { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.7; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .badge {
    padding: 7px 14px;
    background: #F1F5F9;
    border-radius: 99px;
    font-size: var(--t-sm);
    color: #374151;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .hero-flow { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-bottom:48px; }
  .flow-step { padding:5px 13px; background:var(--c-bg-2); border:1px solid var(--c-border); border-radius:99px; font-size:var(--t-sm); font-weight:500; color:var(--c-text-2); }
  .flow-arr  { color:var(--c-text-3); font-size:.85rem; }
  .feature-card--featured {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #EEF2FF 0%, #F0FDF4 100%);
    border-color: transparent;
  }
  .feature-card--featured .feature-card__icon-wrap {
    width: 56px; height: 56px;
    background: #1E3461;
    color: #fff;
    font-size: 1.5rem;
    border-radius: 14px;
  }
  .section-mini-label { font-size:var(--t-xs); font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--c-text-3); margin-top:32px; margin-bottom:10px; }

  /* ══════════════════════════════════════
     7. SUB-NAV
  ══════════════════════════════════════ */
  .sub-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
    align-items: center;
  }
  .sub-nav::-webkit-scrollbar { display: none; }
  .sub-nav-wrap { position:relative; display:flex; align-items:center; gap:4px; margin-bottom:32px; }
  .sub-nav-wrap .sub-nav { flex:1; margin-bottom:0; }
  .sub-nav-arr { flex-shrink:0; width:30px; height:30px; border-radius:50%; background:var(--c-bg-2); border:1px solid var(--c-border); font-size:17px; color:var(--c-text-2); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; line-height:1; transition:opacity .15s,background .15s; }
  .sub-nav-arr:disabled { opacity:.2; cursor:default; }
  .sub-nav-arr:not(:disabled):hover { background:var(--c-bg-3,#f0f0f0); }
  .sub-nav__btn {
    padding: 9px 18px;
    border-radius: 99px;
    font-size: var(--t-sm);
    font-weight: 500;
    color: var(--c-text-3);
    white-space: nowrap;
    min-height: 40px;
    display: flex;
    align-items: center;
    border: 1px solid transparent;
    transition: background var(--fast), color var(--fast), border-color var(--fast);
  }
  .sub-nav__btn:hover { color: var(--c-text); background: var(--c-bg-2); }
  .sub-nav__btn.is-active {
    background: var(--c-course);
    color: #ffffff;
    font-weight: 700;
    border-color: var(--c-course);
  }

  /* ══════════════════════════════════════
     8. COURSE VIEW
  ══════════════════════════════════════ */
  .course-view { display: none; }
  .course-view.is-active {
    display: block;
    animation: fadeUp 210ms var(--ease);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .course-card {
    border: 1px solid var(--c-border);
    border-top: 4px solid var(--c-course);
    border-radius: 0 0 20px 20px;
    background: var(--c-course-tint);
    padding: 32px;
    transition: border-top-color var(--base), background var(--base);
  }
  .course-card__meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .course-card__tag {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--c-course);
    transition: color var(--base);
  }
  .course-card__duration { font-size: var(--t-sm); color: var(--c-text-3); font-weight: 500; }
  .course-card__body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }
  .course-card__title {
    font-size: var(--t-2xl);
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1.18;
    margin-bottom: 14px;
    white-space: pre-line;
  }
  .course-card__desc { font-size: var(--t-md); color: var(--c-text-2); line-height: 1.75; }
  .course-card__skills {
    background: var(--c-bg);
    border: 1px solid var(--c-border);
    border-radius: 14px;
    padding: 22px;
  }
  .course-card__skills-label {
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--c-text-3);
    margin-bottom: 14px;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tags li {
    padding: 6px 14px;
    border: 1.5px solid var(--c-course);
    border-radius: 99px;
    font-size: var(--t-xs);
    color: var(--c-course);
    font-weight: 600;
    transition: border-color var(--base), color var(--base);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* ══════════════════════════════════════
     9. CURRICULUM ACCORDION
  ══════════════════════════════════════ */
  .dept-intro { margin-bottom: 32px; }
  .dept-intro__text {
    font-size: var(--t-md);
    color: var(--c-text-2);
    line-height: 1.75;
    white-space: pre-line;
    margin-bottom: 18px;
    padding: 20px 22px;
    background: var(--c-bg-2);
    border-left: 3px solid var(--c-course);
    border-radius: 0 12px 12px 0;
  }
  .dept-intro__text:empty:not(:focus) { display: none; }
  .admin-edit .dept-intro__text:empty { display: block; min-height: 48px; }
  .admin-edit .dept-intro__text:empty::before { content: '학과 소개 텍스트를 여기에 입력하세요 (클릭해서 편집)'; color: var(--c-text-3); font-style: italic; font-size: var(--t-sm); }
  .admin-edit .dept-intro__text .admin-editable:empty::before { content: '학과 소개 텍스트를 여기에 입력하세요 (클릭해서 편집)'; color: var(--c-text-3); font-style: italic; font-size: var(--t-sm); }
  .admin-edit .dept-intro__text:has(.admin-editable:empty) { min-height: 48px; }
  .dept-intro__img {
    width: 100%;
    display: block;
    border-radius: 14px;
    object-fit: contain;
  }
  .dept-intro__img-wrap { position: relative; }
  .dept-intro__img-edit {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,.55); color: #fff;
    border: none; border-radius: 8px; padding: 5px 10px;
    font-size: .75rem; cursor: pointer;
  }
  .curr-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .curr-header__title { font-size: var(--t-2xl); font-weight: 800; letter-spacing: -.03em; }
  .curr-header__meta  { font-size: var(--t-sm); color: var(--c-text-3); text-align: right; line-height: 1.6; }

  .accordion { border-top: 1px solid var(--c-border); }

  /* Accordion head: wraps trigger + optional admin del button */
  .accordion__head {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--c-border);
  }
  .accordion__head .admin-del-btn { flex-shrink: 0; margin-right: 8px; }

  .accordion__trigger {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 0;
    text-align: left;
    min-height: 56px;
    transition: background var(--fast);
  }
  .accordion__trigger:active { background: var(--c-bg-2); }
  .accordion__num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--c-border);
    font-size: var(--t-xs);
    font-weight: 700;
    color: var(--c-text-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background var(--base), border-color var(--base), color var(--base);
  }
  .accordion__trigger[aria-expanded="true"] .accordion__num {
    background: var(--c-course);
    border-color: var(--c-course);
    color: #fff;
  }
  .accordion__week { font-size: var(--t-sm); font-weight: 700; color: var(--c-text-3); min-width: 72px; flex-shrink: 0; }
  .accordion__topic { flex: 1; font-size: var(--t-md); font-weight: 500; letter-spacing: -.01em; }
  .accordion__chevron {
    width: 7px; height: 7px;
    border-right: 1.8px solid var(--c-text-3);
    border-bottom: 1.8px solid var(--c-text-3);
    transform: rotate(45deg);
    flex-shrink: 0;
    transition: transform 240ms var(--ease);
    margin-right: 4px;
  }
  .accordion__trigger[aria-expanded="true"] .accordion__chevron { transform: rotate(-135deg); }
  .accordion__body { max-height: 0; overflow: hidden; transition: max-height 320ms var(--ease); }
  .accordion__inner {
    border-left: 3px solid var(--c-course);
    margin-left: calc(28px + 14px);
    padding: 12px 0 20px 18px;
    transition: border-color var(--base);
  }
  .topic-list li {
    font-size: var(--t-sm);
    color: var(--c-text-2);
    line-height: 2.1;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .topic-list li::before { content: '—'; color: var(--c-text-3); flex-shrink: 0; }
  .item-detail { font-weight: 300; color: var(--c-text-3); }
  /* 계층형 커리큘럼 */
  .topic-list .curr-week-hd { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--c-course); margin: 16px 0 4px; padding-top: 14px; border-top: 1px solid var(--c-border); line-height: 1.4; }
  .topic-list .curr-week-hd:first-child { margin-top: 0; border-top: none; padding-top: 0; }
  .topic-list .curr-week-hd::before { display: none; }
  .topic-list .curr-topic-hd { font-weight: 700; color: var(--c-text); line-height: 1.6; gap: 6px; }
  .topic-list .curr-topic-hd::before { display: none; }
  .topic-list .curr-sub-item { padding-left: 14px; line-height: 1.9; }
  .topic-list .curr-sub-item::before { content: '—'; color: var(--c-text-3); flex-shrink: 0; }
  .topic-list .curr-month-hd { font-size: 12px; font-weight: 800; color: var(--c-course); background: color-mix(in srgb, var(--c-course) 10%, transparent); border-radius: 6px; padding: 5px 10px; margin: 20px 0 4px; letter-spacing: .06em; }
  .topic-list .curr-month-hd:first-child { margin-top: 0; }
  .topic-list .curr-month-hd::before { display: none; }
  .curr-month-img-section { position: relative; margin: 12px 0 20px; border-radius: 12px; overflow: hidden; background: var(--c-bg-2); }
  .curr-month-img-section .curr-month-img { width: 100%; display: block; cursor: zoom-in; }
  .curr-month-img-del { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 6px; padding: 3px 8px; font-size: .7rem; cursor: pointer; display: none; }
  .curr-month-img-chg { position: absolute; top: 8px; right: 48px; background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 6px; padding: 3px 8px; font-size: .7rem; cursor: pointer; display: none; }
  .admin-edit .curr-month-img-del, .admin-edit .curr-month-img-chg { display: block; }
  .curr-month-img-empty { margin: 8px 0 16px; }
  .diff-stars { font-size: 11px; letter-spacing: 1.5px; flex-shrink: 0; margin-left: 6px; cursor: default; }
  .diff-stars .s-on { color: #F59E0B; }
  .diff-stars .s-off { color: var(--c-border); }
  .diff-stars.editable { cursor: pointer; }
  .logo-row { display: flex; align-items: center; gap: 5px; flex-shrink: 0; margin-left: 4px; }
  .logo-badge { display: inline-flex; align-items: center; gap: 2px; }
  .logo-badge img { width: 15px; height: 15px; filter: grayscale(1) opacity(0.55); }
  .logo-badge__text { font-size: 9px; background: var(--c-bg-2); border: 1px solid var(--c-border); border-radius: 3px; padding: 1px 4px; color: var(--c-text-3); }
  .logo-del-btn { font-size: 9px; background: none; border: none; color: var(--c-text-3); cursor: pointer; padding: 0 1px; line-height: 1; }
  .logo-add-btn { font-size: 10px; background: none; border: 1px dashed var(--c-border); border-radius: 4px; padding: 2px 6px; color: var(--c-text-3); cursor: pointer; white-space: nowrap; }
  .logo-popover { position: fixed; z-index: 300; background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 12px; padding: 12px; width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,.18); }
  .logo-popover input { width: 100%; box-sizing: border-box; border: 1px solid var(--c-border); border-radius: 6px; padding: 6px 8px; font-size: 12px; background: var(--c-bg-2); color: var(--c-text); outline: none; }
  .logo-popover-list { margin-top: 8px; max-height: 140px; overflow-y: auto; }
  .logo-popover-item { display: flex; align-items: center; gap: 8px; padding: 5px 4px; cursor: pointer; border-radius: 6px; font-size: 12px; color: var(--c-text); }
  .logo-popover-item:hover { background: var(--c-bg-2); }
  .logo-popover-item img { width: 14px; height: 14px; opacity: 0.7; }
  .prereq-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 0 0 10px calc(28px + 14px + 8px); }
  .prereq-label { font-size: 10px; color: var(--c-text-3); flex-shrink: 0; }
  .prereq-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; background: var(--c-bg-2); border: 1px solid var(--c-border); font-size: 10px; color: var(--c-text-2); }
  .prereq-chip button { background: none; border: none; color: var(--c-text-3); cursor: pointer; padding: 0 0 0 2px; font-size: 10px; line-height: 1; }
  .logo-popover-item.is-selected { background: var(--c-bg-2); }
  .logo-popover-item.is-selected::after { content: '✓'; margin-left: auto; color: var(--c-course); font-size: 12px; font-weight: 700; }
  .logo-popover-close { width: 100%; margin-top: 8px; padding: 6px; border: 1px solid var(--c-border); border-radius: 6px; background: var(--c-bg-2); font-size: 12px; color: var(--c-text); cursor: pointer; }
  .drag-handle { cursor: grab; color: var(--c-border); padding: 0 8px 0 0; font-size: 16px; flex-shrink: 0; user-select: none; line-height: 1; }
  .drag-handle:active { cursor: grabbing; }
  /* 커리큘럼 ↔ 포트폴리오 서브탭 */
  .curr-view-tabs { display: flex; gap: 4px; padding: 0 16px 14px; }
  .curr-tab-btn { padding: 5px 16px; border-radius: 100px; border: 1px solid var(--c-border); font-size: 12px; font-weight: 600; background: none; color: var(--c-text-2); cursor: pointer; transition: background .15s, color .15s; }
  .curr-tab-btn.is-active { background: var(--c-course); color: #fff; border-color: var(--c-course); }
  .curr-tab-panel.is-hidden { display: none; }
  /* 포트폴리오 그리드 */
  .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 8px; }
  .portfolio-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; background: var(--c-bg-2); cursor: pointer; }
  .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; object-position: center center; max-height: 450px; }
  .portfolio-item:hover img { transform: scale(1.04); }
  .portfolio-item--video { cursor: default; }
  .portfolio-item--video iframe { width: 100%; height: 100%; border: 0; }
  .portfolio-del-btn { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,.55); color: #fff; border: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .portfolio-add-btn { display: block; margin: 4px 16px 16px; width: calc(100% - 32px); padding: 12px; border: 1.5px dashed var(--c-border); border-radius: 10px; background: none; font-size: 13px; color: var(--c-text-3); cursor: pointer; text-align: center; }
  .portfolio-empty { text-align: center; color: var(--c-text-3); font-size: 13px; padding: 48px 0; grid-column: 1/-1; }
  .accordion.drag-over { border-top: 2px solid var(--c-course); }
  .accordion.is-dragging { opacity: 0.35; }

  /* ══════════════════════════════════════
     10. CHECKLIST
  ══════════════════════════════════════ */
  .checklist-intro {
    font-size: var(--t-lg);
    color: var(--c-text-2);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .checklist-card {
    padding: 28px 28px 28px 24px;
    border: 1px solid var(--c-border);
    border-left: 4px solid var(--c-border);
    border-radius: 16px;
    transition: border-left-color var(--base);
    max-width: 680px;
  }
  .checklist-card[data-colorkey="web"]   { --cl: #3B82F6; }
  .checklist-card[data-colorkey="ps"]    { --cl: #F97316; }
  .checklist-card[data-colorkey="video"] { --cl: #EF4444; }
  .checklist-card[data-colorkey="uiux"]  { --cl: #8B5CF6; }
  .checklist-card[data-colorkey="ai"]    { --cl: #0EA5E9; }
  .checklist-card { border-left-color: var(--cl, #e8e8e8); }
  .kedustore-banner { display:flex; align-items:center; gap:14px; padding:14px 18px; background:#EFF6FF; border:1px solid #BFDBFE; border-radius:12px; text-decoration:none; margin-bottom:20px; color:inherit; }
  .kedustore-banner strong { display:block; font-size:var(--t-sm); font-weight:700; color:#1E3461; }
  .kedustore-banner .kb-sub { font-size:var(--t-xs); color:var(--c-text-2); }
  .kedustore-banner__icon { font-size:1.5rem; flex-shrink:0; }
  .kedustore-banner__arrow { margin-left:auto; font-weight:700; color:#1E3461; flex-shrink:0; }
  .checklist-books { margin-bottom:22px; }
  .checklist-books__label { font-size:var(--t-xs); font-weight:700; letter-spacing:.05em; color:var(--c-text-3); margin-bottom:10px; }
  .checklist-books__grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
  .book-thumb { display:flex; flex-direction:column; align-items:center; gap:5px; text-decoration:none; width:68px; }
  .book-thumb img { width:68px; height:88px; object-fit:cover; border-radius:6px; border:1px solid var(--c-border); box-shadow:0 1px 3px rgba(0,0,0,.1); }
  .book-thumb span { font-size:9px; color:var(--c-text-2); text-align:center; line-height:1.3; word-break:keep-all; }
  .kedustore-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:#1E3461; color:#fff; border-radius:8px; text-decoration:none; font-size:var(--t-xs); font-weight:700; }
  .supply-img { width:100%; max-width:480px; border-radius:10px; margin-bottom:20px; border:1px solid var(--c-border); }
  .book-admin-card { width:80px; display:flex; flex-direction:column; gap:3px; }
  .book-admin-card > img { width:80px; height:100px; object-fit:cover; border-radius:6px; border:1px solid var(--c-border); }
  .book-input { width:100%; font-size:9px; padding:2px 4px; border:1px solid #d1d5db; border-radius:3px; box-sizing:border-box; background:#fff; }
  .checklist-card__tag {
    display: inline-block;
    font-size: var(--t-xs);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--cl, var(--c-text-3));
    margin-bottom: 8px;
  }
  .checklist-card__title { font-size: var(--t-md); font-weight: 700; margin-bottom: 18px; letter-spacing: -.01em; }
  .checklist-card__list { display: flex; flex-direction: column; gap: 10px; }
  .checklist-card__list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: var(--t-sm);
    color: var(--c-text-2);
    line-height: 1.6;
  }
  .check-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--cl, var(--c-text-3));
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  /* ══════════════════════════════════════
     11. FOCUS
  ══════════════════════════════════════ */
  :focus-visible { outline: 2px solid var(--c-course); outline-offset: 2px; border-radius: 4px; }

  /* ══════════════════════════════════════
     12. RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 680px) {
    :root { --t-hero: 3rem; --t-3xl: 1.8rem; --t-2xl: 1.4rem; }
    .page { padding: 28px 18px 48px; }
    .stat-row { grid-template-columns: 1fr; }
    .stat-num { color: #1E3461; }
    .feature-grid { grid-template-columns: 1fr; }
    .feature-card { padding: 18px; gap: 14px; }
    .course-card__body { grid-template-columns: 1fr; }
    .header { padding: 0 16px; gap: 14px; }
  }
  @media (min-width: 1100px) {
    :root { --t-hero: 5.5rem; }
    .feature-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ══════════════════════════════════════
     13. ADMIN — 로그인 모달
  ══════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 36px 32px;
    width: min(360px, 90vw);
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  }
  .modal-box h3 { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 20px; }
  .modal-box input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--c-border);
    border-radius: 10px;
    font: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 150ms;
  }
  .modal-box input[type="password"]:focus { border-color: #3B82F6; }
  .modal-error { color: #EF4444; font-size: 0.78rem; margin-top: 8px; display: none; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .modal-btn {
    flex: 1; padding: 12px;
    border-radius: 10px;
    font: inherit; font-size: 0.9rem; font-weight: 700;
    border: none; cursor: pointer;
    transition: background 150ms;
  }
  .modal-btn-cancel  { background: var(--c-bg-2); color: var(--c-text-2); }
  .modal-btn-cancel:hover { background: #e0e0de; }
  .modal-btn-confirm { background: #111; color: #fff; }
  .modal-btn-confirm:hover { background: #333; }


  /* ══════════════════════════════════════
     13b. 범용 편집 모달 필드
  ══════════════════════════════════════ */
  .edit-modal { width: min(500px, 93vw); max-height: 88vh; overflow-y: auto; }
  .edit-modal h3 { font-size: 1rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 18px; }
  .modal-field { margin-bottom: 13px; }
  .modal-field > label { display: block; font-size: 10.5px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .modal-field input[type="text"],
  .modal-field textarea,
  .modal-field select {
    width: 100%; padding: 9px 11px; border: 1.5px solid var(--c-border);
    border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none;
    transition: border-color 150ms; font-family: inherit; color: var(--c-text);
  }
  .modal-field input[type="text"]:focus,
  .modal-field textarea:focus,
  .modal-field select:focus { border-color: #3B82F6; }
  .modal-field textarea { min-height: 88px; resize: vertical; line-height: 1.5; }
  .field-hint { font-size: 11px; color: #9CA3AF; margin-top: 4px; }
  .file-drop-zone {
    border: 2px dashed #D1D5DB; border-radius: 10px;
    padding: 16px 12px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .file-drop-zone.drag-over { border-color: #3B82F6; background: #EFF6FF; }
  .file-drop-preview img { max-height: 80px; border-radius: 6px; margin: 0 auto 8px; display: block; object-fit: cover; }
  .file-drop-zone p { font-size: 12px; color: #6B7280; margin: 0 0 8px; }
  .file-drop-btn { font-size: 12px; padding: 5px 12px; border: 1px solid var(--c-border); border-radius: 6px; background: #fff; cursor: pointer; color: var(--c-text); }
  .file-drop-btn:hover { background: var(--c-bg-2); }
  /* ══════════════════════════════════════
     14. ROADMAP
  ══════════════════════════════════════ */
  .roadmap-steps { display: flex; flex-direction: column; gap: 0; margin-top: 24px; }
  .roadmap-step { display: flex; gap: 20px; position: relative; padding-bottom: 28px; }
  .roadmap-step:last-child { padding-bottom: 0; }
  .roadmap-step__line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .roadmap-step__dot { width: 44px; height: 44px; border-radius: 50%; background: var(--c-course); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .8rem; letter-spacing: .04em; }
  .roadmap-step__connector { width: 2px; flex: 1; background: var(--c-border); margin-top: 6px; min-height: 20px; }
  .roadmap-step:last-child .roadmap-step__connector { display: none; }
  .roadmap-step__body { padding-top: 10px; padding-left: 4px; flex: 1; }
  .roadmap-step__title { font-size: var(--t-lg); font-weight: 700; margin-bottom: 3px; }
  .roadmap-step__weeks { font-size: var(--t-sm); color: var(--c-course); font-weight: 600; margin-bottom: 6px; }
  .roadmap-step__desc { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.65; }

  /* ══════════════════════════════════════
     15. INSTRUCTORS
  ══════════════════════════════════════ */
  .instructor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 24px; }
  .instructor-card { background: var(--c-bg-2); border-radius: 16px; padding: 26px 22px; display: flex; gap: 18px; align-items: flex-start; }
  .instructor-avatar { position: relative; width: 88px; height: 88px; border-radius: 50%; background: #374151; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; overflow: visible; }
  .instructor-avatar.is-m { background: #1E3461; }
  .instructor-avatar.is-f { background: #7C1D40; }
  .instructor-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; overflow: hidden; }
  .inst-photo-btn { position: absolute; bottom: -2px; right: -2px; width: 22px; height: 22px; border-radius: 50%; background: #3B82F6; color: #fff; border: 2px solid #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; z-index: 1; }
  .instructor-name { font-size: var(--t-lg); font-weight: 700; margin-bottom: 3px; }
  .instructor-specialty { font-size: var(--t-sm); color: var(--c-text-2); font-weight: 600; margin-bottom: 10px; background: var(--c-bg); display: inline-block; padding: 2px 10px; border-radius: 20px; border: 1px solid var(--c-border); }
  .instructor-career { font-size: var(--t-sm); color: var(--c-text-2); line-height: 1.7; white-space: pre-line; }

  /* ══════════════════════════════════════
     16. REVIEWS v2
  ══════════════════════════════════════ */
  .review-banner { margin-bottom: 20px; }
  .review-banner__headline { font-size: var(--t-xl); font-weight: 800; letter-spacing: -.03em; line-height: 1.35; margin-bottom: 6px; }
  .review-banner__sub { font-size: var(--t-sm); color: var(--c-text-2); margin-bottom: 14px; }
  .review-banner__chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .review-banner__chip { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 100px; background: var(--c-bg-2); border: 1px solid var(--c-border); font-size: var(--t-sm); font-weight: 600; color: var(--c-text); }

  .review-grid-v2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .review-card-v2 {
    background: #fff; border: 1px solid var(--c-border); border-radius: 18px;
    padding: 22px 22px 18px; display: flex; flex-direction: column; gap: 12px;
    position: relative; overflow: hidden;
    transition: box-shadow 220ms, transform 220ms;
  }
  .review-card-v2:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.09); transform: translateY(-2px); }
  .review-card-v2::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: var(--rv-accent, #3B82F6);
  }
  .review-card-v2__deco {
    position: absolute; top: 12px; right: 18px;
    font-size: 3.6rem; line-height: 1;
    color: var(--rv-accent, #3B82F6); opacity: .07;
    font-family: Georgia, serif; pointer-events: none; user-select: none;
  }
  .review-card-v2__head { display: flex; align-items: center; gap: 11px; }
  .review-avatar-v2 {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--rv-accent, #3B82F6); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem; font-weight: 800; flex-shrink: 0;
  }
  .review-card-v2__name { font-size: var(--t-sm); font-weight: 700; margin-bottom: 4px; }
  .review-card-v2__tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .rv-tag-course {
    font-size: 10px; font-weight: 600; color: var(--c-text-2);
    background: var(--c-bg-2); border: 1px solid var(--c-border);
    padding: 2px 7px; border-radius: 20px;
  }
  .rv-tag-pass {
    font-size: 10px; font-weight: 700; color: #15803d;
    background: #f0fdf4; border: 1px solid #86efac;
    padding: 2px 7px; border-radius: 20px;
  }
  .review-card-v2__text { font-size: var(--t-sm); color: var(--c-text); line-height: 1.82; flex: 1; }
  .review-card-v2__foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .rv-stars { color: #FBBF24; font-size: .78rem; letter-spacing: 1.5px; }
  .rv-date  { font-size: 11px; color: var(--c-text-3); }

  .review-ghost {
    background: var(--c-bg-2); border: 1px dashed var(--c-border);
    border-radius: 18px; height: 110px; opacity: 0.45;
  }
  .review-more-label {
    grid-column: 1 / -1; text-align: center;
    padding: 4px 0 2px;
    font-size: var(--t-sm); color: var(--c-text-3);
    letter-spacing: .12em; font-weight: 500;
  }

  @media (max-width: 680px) { .review-grid-v2 { grid-template-columns: 1fr; } .review-ghost { display: none; } }

  /* ══════════════════════════════════════
     17. IMAGE GALLERY & LIGHTBOX
  ══════════════════════════════════════ */
  .img-gallery { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 16px; margin-bottom: 8px; scroll-snap-type: x mandatory; scrollbar-width: thin; }
  .img-gallery::-webkit-scrollbar { height: 3px; }
  .img-gallery::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 2px; }
  .img-gallery__item { flex-shrink: 0; width: 480px; aspect-ratio: 4/3; max-height: 360px; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; scroll-snap-align: start; border: 1px solid var(--c-border); }
  .img-gallery__item img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; object-position: center center; }
  .img-gallery__item:hover img { transform: scale(1.04); }
  .img-gallery__del { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: .7rem; display: flex; align-items: center; justify-content: center; }
  .img-gallery__add { flex-shrink: 0; width: 140px; aspect-ratio: 4/3; border-radius: 12px; border: 2px dashed var(--c-border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--c-text-2); font-size: var(--t-sm); background: none; scroll-snap-align: start; }

function logoUrl(slug) {
  if (!slug) return '';
  if (LOGO_DATA[slug]) return LOGO_DATA[slug];
  if (slug.startsWith('iconify:')) {
    const rest = slug.slice(8);
    const col  = rest.split(':')[0];
    const icon = rest.split(':')[1];
    return `https://api.iconify.design/${col}/${icon}.svg?color=%23888`;
  }
  return `https://cdn.jsdelivr.net/npm/simple-icons@11/icons/${slug}.svg`;
}

function linkify(text) {
  if (!text) return text;
  return text.replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(?:\/[^\s<]*)?)/g, url => {
    if (url.includes('@') || !url.includes('.')) return url;
    const href = /^https?:\/\//.test(url) ? url : `https://${url}`;
    return `<a href="${href}" target="_blank" rel="noopener" style="color:var(--c-course);text-decoration:underline;word-break:break-all">${url}</a>`;
  });
}

let isAdmin    = false;
let isEditMode = false;
let currentPage   = 'intro';
let currentCourse = 'web';
let db      = null;
let storage = null;

/* ══════════════════════════════════════════════════
   PATH HELPERS
══════════════════════════════════════════════════ */
function setByPath(path, value) {
  const parts = path.split('.');
  const root  = parts[0];
  const keys  = parts.slice(1);
  let curr;
  if (root === 'ui')          curr = UI_DATA;
  else if (root === 'instructors') curr = INSTRUCTORS_DATA;
  else if (root === 'reviews')     curr = REVIEWS_DATA;
  else                             curr = COURSES;
  for (let i = 0; i < keys.length - 1; i++) {
    const k = keys[i];
    curr = curr[isNaN(k) ? k : +k];
    if (curr == null) return;
  }
  const last = keys[keys.length - 1];
  curr[isNaN(last) ? last : +last] = value;
}

function maskName(name) {
  if (!name) return name;
  return name.charAt(0) + '○'.repeat(Math.min(name.length - 1, 2));
}

/* Editable span helper — wraps text in contenteditable only in edit mode */
function E(path, text) {
  if (!isEditMode) return String(text);
  const safe = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span contenteditable="true" data-path="${path}" class="admin-editable">${safe}</span>`;
}

/* ══════════════════════════════════════════════════
   FIREBASE
══════════════════════════════════════════════════ */
const FB_READY = !FIREBASE_CONFIG.apiKey.startsWith('여기에');

async function initFirebase() {
  if (!FB_READY) { console.info('Firebase 미설정 — 오프라인 모드로 실행 중'); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    await loadFromFirestore();
    // Storage는 관리자 모드(업로드)에서만 필요 — 동적 로드
    loadStorageSDK();
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e.message);
  }
}

function loadStorageSDK() {
  if (typeof firebase === 'undefined' || storage) return;
  const s = document.createElement('script');
  s.src = 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js';
  s.onload = () => { try { storage = firebase.storage(); } catch(e) {} };
  document.head.appendChild(s);
}

async function loadFromFirestore() {
  if (!db) return;
  try {
    const snap = await db.collection('curriculum').doc('main').get();
    if (snap.exists) {
      const data = snap.data();
      if (data.courses && Object.keys(data.courses).length) COURSES = data.courses;
      if (data.ui)          UI_DATA          = data.ui;
      if (data.instructors) INSTRUCTORS_DATA = data.instructors;
      if (data.reviews)     REVIEWS_DATA     = data.reviews;
      if (data.books)       Object.assign(BOOKS_DATA, data.books);
    }
  } catch(e) {
    console.warn('데이터 로드 실패, 기본값 사용:', e.message);
  }
}

async function saveData() {
  if (!db) {
    showToast('Firebase 미연결 — FIREBASE_CONFIG 설정 필요', 'error');
    return;
  }
  try {
    await db.collection('curriculum').doc('main').set({
      courses:     COURSES,
      ui:          UI_DATA,
      instructors: INSTRUCTORS_DATA,
      reviews:     REVIEWS_DATA,
      books:       BOOKS_DATA,
      updatedAt:   new Date().toISOString()
    });
    showToast('저장되었습니다 ✓');
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
    console.error(e);
  }
}

══════════════════════════════════════════════════ */
let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type ? ' ' + type : '');
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ══════════════════════════════════════════════════
   ADMIN AUTH
══════════════════════════════════════════════════ */
let _holdTimer;

function initAdminTrigger() {
  const ind = document.getElementById('indicator');
  ind.addEventListener('pointerdown', () => {
    _holdTimer = setTimeout(showLoginModal, 2000);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev =>
    ind.addEventListener(ev, () => clearTimeout(_holdTimer))
  );
  if (sessionStorage.getItem('admin') === '1') {
    isAdmin = true;
    showAdminUI();
  }
}

function showLoginModal() {
  if (isAdmin) return;
  document.getElementById('login-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw').focus(), 60);
}

function submitLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    sessionStorage.setItem('admin', '1');
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('admin-pw').value = '';
    document.getElementById('login-error').style.display = 'none';
    showAdminUI(); enterEditMode();
    showToast('관리자 편집 모드 시작');
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-pw').focus();
  }
}

function cancelLogin() {
  document.getElementById('login-modal').style.display = 'none';
  document.getElementById('admin-pw').value = '';
  document.getElementById('login-error').style.display = 'none';
}

/* ══════════════════════════════════════════════════
   ADMIN UX — 로그인/편집/저장/취소
══════════════════════════════════════════════════ */
let _editSnap = null;
function _takeSnap() {
  return JSON.stringify({ COURSES, UI_DATA, INSTRUCTORS_DATA, REVIEWS_DATA, BOOKS_DATA });
}

function showAdminUI() {
  appEl.classList.add('is-admin');
  document.getElementById('admin-fab').style.display = 'flex';
}

function enterEditMode() {
  isEditMode = true;
  _editSnap = _takeSnap();
  appEl.classList.add('admin-edit');
  document.getElementById('admin-edit-bar').style.display = 'flex';
  document.getElementById('admin-fab').style.display = 'none';
  renderUI(); renderAll(); activateCoursePanels(currentCourse);
}

function exitEditMode(rerender) {
  isEditMode = false;
  appEl.classList.remove('admin-edit');
  document.getElementById('admin-edit-bar').style.display = 'none';
  document.getElementById('admin-fab').style.display = 'flex';
  if (rerender !== false) {
    try { renderUI(); renderAll(); activateCoursePanels(currentCourse); }
    catch(e) { console.error('[exitEditMode] render error:', e); showToast('렌더링 오류: ' + e.message, 'error'); }
  }
}

function adminCancel() {
  if (_editSnap && _takeSnap() !== _editSnap) {
    openDeleteConfirm('저장하지 않은 변경사항이 있습니다.\n취소하면 변경사항이 사라집니다.', () => {
      const s = JSON.parse(_editSnap);
      COURSES = s.COURSES; UI_DATA = s.UI_DATA;
      INSTRUCTORS_DATA = s.INSTRUCTORS_DATA;
      REVIEWS_DATA = s.REVIEWS_DATA; BOOKS_DATA = s.BOOKS_DATA;
      exitEditMode();
    }, '변경사항 버리기');
  } else {
    exitEditMode();
  }
}

async function adminSave() {
  try {
    document.querySelectorAll('[data-path][contenteditable]').forEach(el => {
      if (el.offsetParent !== null) setByPath(el.dataset.path, el.innerText.trim());
    });
    await saveData();
    _editSnap = _takeSnap();
  } catch(e) {
    console.error('[adminSave] error:', e);
    showToast('저장 오류: ' + e.message, 'error');
  }
}

async function adminExit() {
  try {
    document.querySelectorAll('[data-path][contenteditable]').forEach(el => {
      if (el.offsetParent !== null) setByPath(el.dataset.path, el.innerText.trim());
    });
  } catch(e) { console.error('[adminExit] flush error:', e); showToast('편집 오류: ' + e.message, 'error'); }
  if (_editSnap && _takeSnap() !== _editSnap) {
    openDeleteConfirm('저장하지 않은 변경사항이 있습니다.\n저장하고 편집을 종료하시겠습니까?', async () => {
      try { await saveData(); } finally { exitEditMode(); }
    }, '저장하고 종료');
  } else {
    exitEditMode();
  }
}

function adminLogout() {
  isAdmin = false; isEditMode = false; _editSnap = null;
  sessionStorage.removeItem('admin');
  appEl.classList.remove('is-admin', 'admin-edit');
  document.getElementById('admin-edit-bar').style.display = 'none';
  document.getElementById('admin-fab').style.display = 'none';
  renderAll(); renderUI();
}

let _dcmCb = null;
function openDeleteConfirm(msg, cb, btnLabel) {
  _dcmCb = cb;
  document.getElementById('dm-msg').textContent = msg;
  const btn = document.getElementById('dm-ok');
  btn.textContent = btnLabel || '삭제';
  btn.style.background = btnLabel ? '#1E3461' : '#ef4444';
  btn.onclick = async () => { closeDeleteConfirm(); if (cb) { try { await cb(); } catch(e) { console.error('confirm cb error:', e); showToast('오류: ' + e.message, 'error'); } } };
  document.getElementById('delete-modal').style.display = 'flex';
}
function closeDeleteConfirm() {
  document.getElementById('delete-modal').style.display = 'none';
  _dcmCb = null;
}

/* ══════════════════════════════════════════════════
   Firebase Storage 공통 업로드 헬퍼
══════════════════════════════════════════════════ */
async function uploadToStorage(file, prefix) {
  if (!storage) { loadStorageSDK(); throw new Error('Storage 로드 중입니다. 잠시 후 다시 시도하세요.'); }
  const ref = storage.ref(`${prefix}/${Date.now()}_${file.name}`);
  await ref.put(file);
  return await ref.getDownloadURL();
}

let _emCfg = null, _emData = {}, _emPending = {};

function openEditModal(cfg) {
  _emCfg = cfg; _emData = Object.assign({}, cfg.defaults || {}); _emPending = {};
  document.getElementById('em-title').textContent = cfg.title;
  const body = document.getElementById('em-body');
  body.innerHTML = cfg.fields.map(f => {
    const val = (_emData[f.key] ?? '');
    let inp = '';
    if (f.type === 'textarea') {
      inp = `<textarea id="emf-${f.key}" rows="${f.rows||4}">${val.replace(/</g,'&lt;')}</textarea>`;
    } else if (f.type === 'select') {
      const opts = (f.options||[]).map(o =>
        `<option value="${o.value}"${o.value===val?' selected':''}>${o.label}</option>`).join('');
      inp = `<select id="emf-${f.key}">${opts}</select>`;
    } else if (f.type === 'file-drop') {
      const prev = val ? `<img src="${val}" onerror="this.style.display='none'">` : '';
      inp = `<div class="file-drop-zone" id="emf-drop-${f.key}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="_emHandleDrop(event,'${f.key}')">
        <div class="file-drop-preview" id="emf-prev-${f.key}">${prev}</div>
        <p>${val ? '변경: 드래그하거나 파일 선택 · Ctrl+V' : '드래그 또는 Ctrl+V로 붙여넣기'}</p>
        <button class="file-drop-btn" type="button" onclick="_emClickFile('${f.key}')">파일 선택</button>
        <input type="file" id="emf-file-${f.key}" accept="image/*" style="display:none"
               onchange="_emHandleFile(event,'${f.key}')">
      </div>`;
    } else {
      const safe = String(val).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      inp = `<input type="text" id="emf-${f.key}" value="${safe}" placeholder="${f.placeholder||''}">`;
    }
    const hint = f.hint ? `<p class="field-hint">${f.hint}</p>` : '';
    return `<div class="modal-field"><label>${f.label}</label>${inp}${hint}</div>`;
  }).join('');
  document.getElementById('em-save').onclick = _emSave;
  document.getElementById('edit-modal').style.display = 'flex';
  const first = body.querySelector('input[type="text"],textarea');
  if (first) setTimeout(() => first.focus(), 60);
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  _emCfg = null; _emData = {}; _emPending = {};
}

function _emClickFile(key) { document.getElementById('emf-file-'+key)?.click(); }

function _emHandleFile(e, key) {
  const file = e.target.files[0];
  if (file) _emPreview(key, file);
}

function _emHandleDrop(e, key) {
  e.preventDefault();
  document.getElementById('emf-drop-'+key)?.classList.remove('drag-over');
  const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'));
  if (file) _emPreview(key, file);
}

function _emPreview(key, file) {
  _emPending[key] = file;
  const r = new FileReader();
  r.onload = ev => {
    const el = document.getElementById('emf-prev-'+key);
    if (el) el.innerHTML = `<img src="${ev.target.result}">`;
  };
  r.readAsDataURL(file);
}

async function _emSave() {
  if (!_emCfg) return;
  _emCfg.fields.forEach(f => {
    if (f.type === 'file-drop') return;
    const el = document.getElementById('emf-'+f.key);
    if (el) _emData[f.key] = el.value;
  });
  try {
    for (const [key, file] of Object.entries(_emPending)) {
      if (!storage) { showToast('Firebase Storage 미연결', 'error'); return; }
      showToast('이미지 업로드 중...');
      try {
        _emData[key] = await uploadToStorage(file, 'uploads');
      } catch(err) { showToast(err.message, 'error'); return; }
    }
    _emCfg.fields.filter(f => f.type==='file-drop').forEach(f => {
      if (!_emPending[f.key]) _emData[f.key] = _emCfg.defaults?.[f.key] || '';
    });
    const onSave = _emCfg.onSave;
    const data = Object.assign({}, _emData);
    onSave(data);
  } finally {
    closeEditModal();
  }
}

// Ctrl+V 이미지 붙여넣기 (편집 팝업 열려있을 때)
document.addEventListener('paste', e => {
  if (document.getElementById('edit-modal')?.style.display === 'none') return;
  const imgItem = Array.from(e.clipboardData?.items||[]).find(i => i.type.startsWith('image/'));
  if (!imgItem) return;
  const ff = _emCfg?.fields?.find(f => f.type === 'file-drop');
  if (!ff) return;
  const file = imgItem.getAsFile();
  if (file) _emPreview(ff.key, file);
});
function shiftSubNav(navId, dir) {
  const nav = document.getElementById(navId);
  if (!nav) return;
  nav.scrollBy({ left: dir * 200, behavior: 'smooth' });
  setTimeout(() => updateSubNavArrows(navId), 320);
}
function updateSubNavArrows(navId) {
  const nav = document.getElementById(navId);
  if (!nav) return;
  const prev = document.getElementById(navId + '-prev');
  const next = document.getElementById(navId + '-next');
  if (prev) prev.disabled = nav.scrollLeft <= 2;
  if (next) next.disabled = nav.scrollLeft + nav.clientWidth >= nav.scrollWidth - 2;
}

function renderSubNavs() {
  const ids    = Object.keys(COURSES);
  const addBtn = isEditMode ? `<button class="admin-add-course-btn" onclick="addCourse()">+ 강좌 추가</button>` : '';
  const btns   = ids.map(id => `<button class="sub-nav__btn" data-course="${id}">${COURSES[id].label}</button>`).join('') + addBtn;
  document.getElementById('roadmap-subnav').innerHTML    = btns;
  document.getElementById('curr-subnav').innerHTML       = btns;
  document.getElementById('checklist-subnav').innerHTML  = btns;
  ['roadmap-subnav','curr-subnav','checklist-subnav'].forEach(id => {
    const nav = document.getElementById(id);
    if (!nav) return;
    nav.removeEventListener('scroll', nav._arrUpd);
    nav._arrUpd = () => updateSubNavArrows(id);
    nav.addEventListener('scroll', nav._arrUpd, { passive: true });
    updateSubNavArrows(id);
  });
}

function imgUrl(src) { return typeof src === 'string' ? src : (src && src.url ? src.url : ''); }
function imgPos(src) { return typeof src === 'string' ? 'center center' : (src && src.position ? src.position : 'center center'); }
function renderCurriculumView(id) {
  const c  = COURSES[id];
  const em = isEditMode;

  let el = document.getElementById('cr-'+id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'cr-'+id;
    el.className = 'course-view';
    document.getElementById('curr-views').appendChild(el);
  }

  let trackedMonth = 0;
  const monthImgsData = c.monthImgs || {};
  const weekParts = (c.curriculum || []).map((item, wi) => {
    // 이 블록의 첫 번째 주차 번호로 달 계산
    const firstWeekNo = (item.items || [])
      .filter(x => x.startsWith('## '))
      .map(x => parseInt(x.match(/\d+/)?.[0] || 0))
      .find(n => n > 0) || 0;
    const blockMonth = firstWeekNo > 0 ? Math.ceil(firstWeekNo / 4) : 0;

    // 달이 바뀔 때 이전 달 이미지 섹션 주입
    let monthImgPrefix = '';
    if (blockMonth > 0 && blockMonth > trackedMonth && trackedMonth > 0) {
      const url = monthImgsData[trackedMonth];
      monthImgPrefix = url
        ? `<div class="curr-month-img-section"><img src="${url}" class="curr-month-img" onclick="openLightbox('${url}')"><button class="curr-month-img-chg" onclick="addMonthImg('${id}',${trackedMonth})">🖼 변경</button><button class="curr-month-img-del" onclick="deleteMonthImg('${id}',${trackedMonth})">✕</button></div>`
        : (em ? `<div class="curr-month-img-empty"><button class="admin-add-btn" onclick="addMonthImg('${id}',${trackedMonth})">+ ${trackedMonth}달차 이미지 추가</button></div>` : '');
    }
    if (blockMonth > 0) trackedMonth = blockMonth;

    // #4 Bold/Light: split at ' · ' + 계층형 마커 지원 (## Week, # Topic) + 월별 그룹
    const itemsList = item.items || [];
    const totalWeekCount = itemsList.filter(x => x.startsWith('## ')).length;
    const useMonthGroups = !em && totalWeekCount >= 5;
    let lastMonthNum = 0;
    const items = itemsList.map((it, ii) => {
      if (!em && it.startsWith('## ')) {
        const wm = it.match(/\d+/); const wn = wm ? parseInt(wm[0]) : 0;
        const mn = Math.ceil(wn / 4);
        let prefix = '';
        if (useMonthGroups && mn !== lastMonthNum) { lastMonthNum = mn; prefix = `<li class="curr-month-hd">${mn}달차</li>`; }
        return prefix + `<li class="curr-week-hd">${it.slice(3)}</li>`;
      }
      if (!em && it.startsWith('# ')) {
        return `<li class="curr-topic-hd">▸ ${it.slice(2)}</li>`;
      }
      const sepIdx = it.indexOf(' · ');
      const label  = sepIdx >= 0 ? it.slice(0, sepIdx) : it;
      const detail = sepIdx >= 0 ? it.slice(sepIdx) : '';
      const textHtml = em
        ? `<span class="admin-inline-row">${E('courses.'+id+'.curriculum.'+wi+'.items.'+ii, it)}<button class="admin-del-btn" onclick="deleteCurrItem('${id}',${wi},${ii})">✕</button></span>`
        : `<strong>${linkify(label)}</strong>${detail ? `<span class="item-detail">${linkify(detail)}</span>` : ''}`;
      const cls = (!em && itemsList.some(x => x.startsWith('## ') || x.startsWith('# '))) ? ' class="curr-sub-item"' : '';
      return `<li${cls}>${textHtml}</li>`;
    }).join('');

    // #3 Difficulty stars
    const diff = item.difficulty !== undefined ? item.difficulty : (DIFFICULTY_MAP[item.week] || 3);
    const starsHtml = Array.from({length: 5}, (_, i) =>
      `<span class="${i < diff ? 's-on' : 's-off'}">${i < diff ? '★' : '☆'}</span>`
    ).join('');
    const diffEl = em
      ? `<span class="diff-stars editable" title="난이도 ${diff}/5">${starsHtml}</span>`
      : `<span class="diff-stars" title="난이도 ${diff}/5">${starsHtml}</span>`;

    // #2 Logo row
    const logoSlugs = (item.logos && item.logos.length > 0) ? item.logos
      : (AUTO_LOGO_MAP[item.week] ? [AUTO_LOGO_MAP[item.week]] : []);
    const logoImgs = logoSlugs.map((slug, li) => {
      const delBtn = em ? `<button class="logo-del-btn" onclick="event.stopPropagation();removeLogo('${id}',${wi},${li})">✕</button>` : '';
      const preset = LOGO_PRESETS.find(p => p.slug === slug);
      const label  = preset?.label || preset?.name || slug;
      return `<span class="logo-badge"><img src="${logoUrl(slug)}" width="15" height="15" onerror="this.parentNode.innerHTML='<span class=logo-badge__text>${label}</span>'">${delBtn}</span>`;
    }).join('');
    const addLogoBtn = em ? `<button class="logo-add-btn" onclick="event.stopPropagation();openLogoPopover('${id}',${wi},this)">+ 로고</button>` : '';
    const logoRowEl = (logoImgs || addLogoBtn) ? `<span class="logo-row">${logoImgs}${addLogoBtn}</span>` : '';

    // 선수강과목
    const prereqs = item.prereqs || [];
    const prereqChips = prereqs.map((p, pi) =>
      `<span class="prereq-chip">${p}${em ? `<button onclick="removePrereq('${id}',${wi},${pi})">✕</button>` : ''}</span>`
    ).join('');
    const prereqRow = (prereqs.length > 0 || em) ? `
      <div class="prereq-row">
        <span class="prereq-label">선수강:</span>
        ${prereqChips}
        ${em ? `<button class="logo-add-btn" onclick="addPrereq('${id}',${wi})">+ 선수강 추가</button>` : ''}
      </div>` : '';

    const wImgs = (item.images || []);
    const wGalleryItems = wImgs.map((imgData, ii) => {
      const url = imgUrl(imgData), pos = imgPos(imgData);
      const posOpts = ['center center','center top','center bottom','left center','right center'];
      const posCtrl = em ? `<select class="img-pos-sel" onchange="event.stopPropagation();setCurrImgPos('${id}',${wi},${ii},this.value)" onclick="event.stopPropagation()">${posOpts.map(p=>`<option value="${p}"${pos===p?' selected':''}>${p}</option>`).join('')}</select>` : '';
      return `<div class="img-gallery__item" onclick="openLightbox('${url}')">
        <img src="${url}" alt="이미지 ${ii+1}" loading="lazy" style="object-position:${pos}">
        ${em ? `<button class="img-gallery__del" onclick="event.stopPropagation();deleteImage('${id}',${wi},${ii})">✕</button>` : ''}
        ${posCtrl}
      </div>`;
    }).join('');
    const wGallery = (wImgs.length > 0 || em) ? `
      <div class="img-gallery" style="margin-top:14px">
        ${wGalleryItems}
        ${em ? `<button class="img-gallery__add" onclick="addImage('${id}',${wi})">+ 이미지<br>추가</button>` : ''}
      </div>` : '';

    const accordionHtml = `
      <div class="accordion" ${em ? `draggable="true" data-cid="${id}" data-wi="${wi}"` : ''}>
        <div class="accordion__head">
          ${em ? `<span class="drag-handle" title="드래그로 순서 변경">⠿</span>` : ''}
          <button class="accordion__trigger" aria-expanded="false">
            <span class="accordion__num">${wi+1}</span>
            <span class="accordion__week">${em ? E('courses.'+id+'.curriculum.'+wi+'.week', item.week) : item.week}</span>
            ${logoRowEl}
            <span class="accordion__topic">${em ? E('courses.'+id+'.curriculum.'+wi+'.topic', item.topic) : item.topic}</span>
            ${diffEl}
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
          ${em ? `<button class="admin-del-btn" onclick="deleteCurrWeek('${id}',${wi})" title="주차 삭제" style="margin-right:8px">✕</button>` : ''}
        </div>
        ${prereqRow}
        <div class="accordion__body">
          <div class="accordion__inner">
            <ul class="topic-list">${items}</ul>
            ${em ? `<div style="margin-top:10px"><button class="admin-add-btn" onclick="addCurrItem('${id}',${wi})">+ 항목 추가</button></div>` : ''}
            ${wGallery}
          </div>
        </div>
      </div>`;
    return monthImgPrefix + accordionHtml;
  });

  // 마지막 달 이미지
  const lastMonthUrl = monthImgsData[trackedMonth];
  const lastMonthHtml = trackedMonth > 0 ? (
    lastMonthUrl
      ? `<div class="curr-month-img-section"><img src="${lastMonthUrl}" class="curr-month-img" onclick="openLightbox('${lastMonthUrl}')"><button class="curr-month-img-chg" onclick="addMonthImg('${id}',${trackedMonth})">🖼 변경</button><button class="curr-month-img-del" onclick="deleteMonthImg('${id}',${trackedMonth})">✕</button></div>`
      : (em ? `<div class="curr-month-img-empty"><button class="admin-add-btn" onclick="addMonthImg('${id}',${trackedMonth})">+ ${trackedMonth}달차 이미지 추가</button></div>` : '')
  ) : '';
  const weeks = weekParts.join('') + lastMonthHtml;

  // 재렌더 전에 활성 탭 기억
  const pfWasActive = document.getElementById('ct-pf-'+id)?.classList.contains('is-hidden') === false;

  if (!c.portfolio) c.portfolio = [];
  const portfolioItems = c.portfolio.map((entry, idx) => {
    const ytId = typeof entry === 'string' && entry.startsWith('youtube:') ? entry.slice(8) : null;
    if (ytId) {
      const embedSrc = `https://www.youtube.com/embed/${ytId}?loop=1&playlist=${ytId}&rel=0&modestbranding=1`;
      return `<div class="portfolio-item portfolio-item--video">
        <iframe src="${embedSrc}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>
        ${em ? `<button class="portfolio-del-btn" onclick="event.stopPropagation();deletePortfolioImage('${id}',${idx})">✕</button>` : ''}
      </div>`;
    }
    const url = typeof entry === 'string' ? entry : entry.url;
    return `<div class="portfolio-item" onclick="openLightbox('${url}')">
      <img src="${url}" loading="lazy">
      ${em ? `<button class="portfolio-del-btn" onclick="event.stopPropagation();deletePortfolioImage('${id}',${idx})">✕</button>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="curr-header">
      <h2 class="curr-header__title">${c.label}</h2>
      <div class="curr-header__meta">${c.duration}</div>
    </div>
    <div class="curr-view-tabs">
      <button class="curr-tab-btn${pfWasActive ? '' : ' is-active'}" onclick="switchCurrTab('${id}','curriculum')">커리큘럼</button>
      <button class="curr-tab-btn${pfWasActive ? ' is-active' : ''}" onclick="switchCurrTab('${id}','portfolio')">포트폴리오</button>
    </div>
    <div class="curr-tab-panel${pfWasActive ? ' is-hidden' : ''}" id="ct-curr-${id}">
      ${weeks}
      ${em ? `<button class="admin-add-block" onclick="addCurrWeek('${id}')">+ 주차 추가</button>` : ''}
    </div>
    <div class="curr-tab-panel${pfWasActive ? '' : ' is-hidden'}" id="ct-pf-${id}">
      <div class="portfolio-grid">${portfolioItems || '<p class="portfolio-empty">포트폴리오 이미지가 없습니다</p>'}</div>
      ${em ? `<div style="display:flex;gap:8px;margin:4px 16px 16px">
        <button class="portfolio-add-btn" style="margin:0;flex:1" onclick="uploadPortfolioImage('${id}')">+ 이미지 추가</button>
        <button class="portfolio-add-btn" style="margin:0;flex:1" onclick="addPortfolioVideo('${id}')">▶ 유튜브 추가</button>
      </div>` : ''}
    </div>`;
}

function renderChecklistCard(id) {
  const c  = COURSES[id];
  const em = isEditMode;
  const ck = PALETTE_KEYS.includes(c.colorKey) ? c.colorKey : 'web';

  let el = document.getElementById('cl-'+id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'cl-'+id;
    el.className = 'course-view';
    document.getElementById('checklist-views').appendChild(el);
  }

  const items = (c.checklist || []).map((item, ci) => `
    <li>
      <span class="check-icon">✓</span>
      ${em
        ? `<span class="admin-inline-row">${E('courses.'+id+'.checklist.'+ci, item)}<button class="admin-del-btn" onclick="deleteChecklistItem('${id}',${ci})">✕</button></span>`
        : linkify(item)
      }
    </li>`).join('');

  const dBooks = BOOKS_DATA[id] || [];
  const booksHtml = (dBooks.length || em) ? `
    <div class="checklist-books">
      <p class="checklist-books__label">필요 교재</p>
      <div class="checklist-books__grid">
        ${dBooks.map((b, bi) => em
          ? `<div class="book-admin-card">
               <img src="${b.img}" onerror="this.style.opacity='.3'" loading="lazy">
               <span style="font-size:9px;text-align:center;line-height:1.3;word-break:keep-all">${b.name}</span>
               <div style="display:flex;gap:3px;justify-content:center">
                 <button class="file-drop-btn" style="padding:2px 6px" onclick="editBook('${id}',${bi})">✏️</button>
                 <button class="admin-del-btn" onclick="deleteBook('${id}',${bi})">✕</button>
               </div>
             </div>`
          : `<a href="${b.link||'#'}" target="_blank" rel="noopener" class="book-thumb">
               <img src="${b.img}" alt="${b.name}" loading="lazy">
               <span>${b.name}</span>
             </a>`
        ).join('')}
      </div>
      ${em
        ? `<button class="admin-add-btn" onclick="addBook('${id}')">+ 교재 추가</button>`
        : dBooks.length ? `<a href="https://www.kedustore.com/books/list.asp#3" target="_blank" rel="noopener" class="kedustore-btn">🛒 교재 구매 바로가기</a>` : ''

function activateCoursePanels(courseId) {
  const ids = Object.keys(COURSES);
  if (!COURSES[courseId]) courseId = ids[0];
  if (!courseId) return;

  document.querySelectorAll('.sub-nav__btn').forEach(b =>
    b.classList.toggle('is-active', b.dataset.course === courseId));
  setTimeout(() => {
    document.querySelectorAll('.sub-nav__btn.is-active').forEach(btn => {
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      const nav = btn.closest('.sub-nav');
      if (nav) updateSubNavArrows(nav.id);
    });
  }, 50);

  document.querySelectorAll('#roadmap-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'rm-'+courseId));
  document.querySelectorAll('#curr-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'cr-'+courseId));
  document.querySelectorAll('#checklist-views > .course-view').forEach(v =>
    v.classList.toggle('is-active', v.id === 'cl-'+courseId));

   PAGE SWITCHING
══════════════════════════════════════════════════ */
const PAGE_ORDER = ['intro','roadmap','curriculum','instructors','reviews','checklist'];

function goToPage(pageId) {
  if (pageId === currentPage) return;
  const outEl = document.getElementById('page-'+currentPage);
  const inEl  = document.getElementById('page-'+pageId);
  outEl.classList.add('exit');
  outEl.classList.remove('is-active');
  setTimeout(() => outEl.classList.remove('exit'), 200);
  inEl.classList.add('is-active');
  inEl.scrollTop = 0;
  document.querySelectorAll('.main-nav__btn').forEach(btn =>
    btn.classList.toggle('is-active', btn.dataset.page === pageId));
  document.getElementById('indicator').textContent =
    `${PAGE_ORDER.indexOf(pageId)+1} / ${PAGE_ORDER.length}`;
  if (['intro','instructors','reviews'].includes(pageId)) setCourseColor(null);
  currentPage = pageId;
}

/* ══════════════════════════════════════════════════
   GLOBAL EVENT DELEGATION
══════════════════════════════════════════════════ */
// Blur (capture) — editable field 반영
document.addEventListener('blur', e => {
  if (!isEditMode) return;
  const el = e.target;
  if (!el.dataset.path) return;
  setByPath(el.dataset.path, el.innerText.trim());
}, true);

// Click — main-nav / sub-nav / accordion
document.addEventListener('click', e => {
  // Main nav
  const mainBtn = e.target.closest('.main-nav__btn');
  if (mainBtn?.dataset.page) { goToPage(mainBtn.dataset.page); return; }

  // Sub-nav
  const subBtn = e.target.closest('.sub-nav__btn');
  if (subBtn?.dataset.course) { activateCoursePanels(subBtn.dataset.course); return; }

  // Difficulty star click (edit mode)
  const starEl = e.target.closest('.diff-stars.editable');
  if (starEl) {
    const trigger = starEl.closest('.accordion__trigger');
    const accordion = trigger?.closest('.accordion');
    const head = accordion?.closest('[data-curr-id]') || document.getElementById('curr-views');
    const stars = starEl.querySelectorAll('span');
    const idx = Array.from(stars).findIndex(s => s === e.target);
    if (idx >= 0) {
      // find id and wi from data attributes on the parent accordion
      const acc = starEl.closest('.accordion');
      const allAccordions = Array.from(acc?.closest('.course-view')?.querySelectorAll('.accordion') || []);
      const wi = allAccordions.indexOf(acc);
      const viewEl = acc?.closest('.course-view');
      const vid = viewEl?.id?.replace('cr-', '');
      if (vid && wi >= 0) setCurrDifficulty(vid, wi, idx + 1);
    }
    return;
  }

  // Accordion trigger (admin/logo/drag 버튼 제외)
  const trigger = e.target.closest('.accordion__trigger');
  if (trigger && !e.target.closest('.admin-del-btn') && !e.target.closest('.logo-add-btn') && !e.target.closest('.logo-del-btn') && !e.target.closest('.logo-row') && !e.target.closest('.drag-handle')) {
    const accordion = trigger.closest('.accordion');
    const body = accordion?.querySelector('.accordion__body');
    if (!body) return;
    const open = trigger.getAttribute('aria-expanded') === 'true';
    trigger.setAttribute('aria-expanded', String(!open));
    body.style.maxHeight = open ? '0' : body.scrollHeight + 'px';
  }
});

/* ══════════════════════════════════════════════════
   DRAG & DROP — 커리큘럼 순서 변경
══════════════════════════════════════════════════ */
document.addEventListener('dragstart', e => {
  const acc = e.target.closest('.accordion[draggable="true"]');
  if (!acc) return;
  _dragCid = acc.dataset.cid;
  _dragWi  = +acc.dataset.wi;
  acc.classList.add('is-dragging');
  e.dataTransfer.effectAllowed = 'move';
});

document.addEventListener('dragover', e => {
  const acc = e.target.closest('.accordion[draggable="true"]');
  if (!acc || acc.dataset.cid !== _dragCid) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.accordion.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (+acc.dataset.wi !== _dragWi) acc.classList.add('drag-over');
});

document.addEventListener('dragleave', e => {
  const acc = e.target.closest('.accordion');
  if (acc && !acc.contains(e.relatedTarget)) acc.classList.remove('drag-over');
});

document.addEventListener('drop', e => {
  const acc = e.target.closest('.accordion[draggable="true"]');
  if (!acc || _dragCid === null) return;
  e.preventDefault();
  const targetWi = +acc.dataset.wi;
  if (targetWi === _dragWi) return;
  const cur = COURSES[_dragCid].curriculum;
  const [moved] = cur.splice(_dragWi, 1);
  cur.splice(targetWi, 0, moved);
  renderCurriculumView(_dragCid);
  if (currentCourse === _dragCid) document.getElementById('cr-'+_dragCid)?.classList.add('is-active');
  _dragCid = null; _dragWi = null;
});

document.addEventListener('dragend', () => {
  document.querySelectorAll('.accordion.is-dragging, .accordion.drag-over')
    .forEach(el => el.classList.remove('is-dragging', 'drag-over'));
  _dragCid = null; _dragWi = null;
});

function closeLogoPopover() {
  if (_activeLogoPopover) { _activeLogoPopover.remove(); _activeLogoPopover = null; }
}
function openLogoPopover(id, wi, btn) {
  closeLogoPopover();
  const rect = btn.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'logo-popover';
  pop.style.top  = (rect.bottom + 6) + 'px';
  pop.style.left = Math.min(rect.left, window.innerWidth - 216) + 'px';
  pop.innerHTML = `
    <input type="text" placeholder="소프트웨어 검색..." oninput="filterLogoPopover(this, '${id}', ${wi})">
    <div class="logo-popover-list" id="lp-list-${id}-${wi}"></div>
    <button class="logo-popover-close" onclick="closeLogoPopover()">완료</button>`;
  document.body.appendChild(pop);
  _activeLogoPopover = pop;
  filterLogoPopover(pop.querySelector('input'), id, wi);
  setTimeout(() => document.addEventListener('click', function _close(e) {
    if (!pop.contains(e.target) && !e.target.closest('.logo-add-btn')) {
      closeLogoPopover(); document.removeEventListener('click', _close);
    }
  }), 50);
}
function filterLogoPopover(input, id, wi) {
  const q        = input.value.toLowerCase();
  const list     = document.getElementById(`lp-list-${id}-${wi}`);
  if (!list) return;
  const selected = COURSES[id]?.curriculum[wi]?.logos || [];
  const filtered = q ? LOGO_PRESETS.filter(p => p.name.toLowerCase().includes(q)) : LOGO_PRESETS;
  list.innerHTML = filtered.map(p => {
    const isSel = selected.includes(p.slug);
    return `<div class="logo-popover-item${isSel ? ' is-selected' : ''}" onclick="toggleLogo('${id}',${wi},'${p.slug}',this)">
      <img src="${logoUrl(p.slug)}" style="filter:grayscale(1)opacity(.6)" onerror="this.style.display='none'" width="14" height="14">
      ${p.name}
    </div>`;
  }).join('');
}
function toggleLogo(id, wi, slug, el) {
  if (!COURSES[id].curriculum[wi].logos) COURSES[id].curriculum[wi].logos = [];
  const logos = COURSES[id].curriculum[wi].logos;
  const idx = logos.indexOf(slug);
  if (idx >= 0) {
    logos.splice(idx, 1);
    el.classList.remove('is-selected');
  } else {
    logos.push(slug);
    el.classList.add('is-selected');
  }
  renderCurriculumView(id);
  if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
  // 팝오버는 닫지 않음 — 다중선택 가능
}
function addLogo(id, wi, slug) {
  if (!COURSES[id].curriculum[wi].logos) COURSES[id].curriculum[wi].logos = [];
  if (!COURSES[id].curriculum[wi].logos.includes(slug)) {

function uploadPortfolioImage(id) {
  if (!storage) { loadStorageSDK(); showToast('Storage 로드 중, 잠시 후 다시 시도해주세요', 'error'); return; }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    showToast(`${files.length}개 업로드 중...`);
    if (!COURSES[id].portfolio) COURSES[id].portfolio = [];
    for (const file of files) {
      try {
        const url = await uploadToStorage(file, `portfolio/${id}`);
        COURSES[id].portfolio.push(url);
      } catch(err) { showToast('업로드 실패: ' + err.message, 'error'); return; }
    }
    renderCurriculumView(id);
    switchCurrTab(id, 'portfolio');
    if (currentCourse === id) document.getElementById('cr-'+id)?.classList.add('is-active');
    showToast('업로드 완료 ✓');
  };
  input.click();
}

      { key: 'weeks', label: '기간',      type: 'text', placeholder: '예: 1–4주차' },
      { key: 'desc',  label: '설명',      type: 'textarea', rows: 3 },
    ],
    defaults: { title: '', weeks: '', desc: '' },
    onSave: (d) => {
      if (!d.title?.trim()) return;
      if (!COURSES[id].roadmap) COURSES[id].roadmap = [];
      const num = String(COURSES[id].roadmap.length + 1).padStart(2, '0');
      COURSES[id].roadmap.push({ phase: num, title: d.title.trim(), weeks: d.weeks, desc: d.desc });
      renderRoadmapView(id);
      document.getElementById('rm-'+id)?.classList.add('is-active');
    }
  });
}
function deleteRoadmapStep(id, si) {
  openDeleteConfirm('이 단계를 삭제하시겠습니까?', () => {
    COURSES[id].roadmap.splice(si, 1);
    renderRoadmapView(id);
    document.getElementById('rm-'+id)?.classList.add('is-active');
  });
}

function addMonthImg(id, month) {

function deleteMonthImg(id, month) {

/* ══════════════════════════════════════════════════
   CRUD — 커리큘럼 이미지
══════════════════════════════════════════════════ */
function addImage(id, wi) {
  if (!storage) { showToast('Firebase Storage 미연결', 'error'); return; }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    showToast('업로드 중...');
    try {
      for (const file of files) {
        const url = await uploadToStorage(file, `curriculum/${id}/w${wi}`);
        if (!COURSES[id].curriculum[wi].images) COURSES[id].curriculum[wi].images = [];
        COURSES[id].curriculum[wi].images.push(url);
      }
      renderCurriculumView(id);
      document.getElementById('cr-'+id)?.classList.add('is-active');
      showToast(`이미지 ${files.length}장 업로드 완료 ✓`);
    } catch(err) {
      showToast('업로드 실패: ' + err.message, 'error');
    }
  };
  input.click();
}
function setCurrImgPos(id, wi, ii, pos) {
  const imgs = COURSES[id].curriculum[wi].images;
  const cur = imgs[ii];
  imgs[ii] = { url: imgUrl(cur), position: pos };
  renderCurriculumView(id);
  document.getElementById('cr-'+id) && document.getElementById('cr-'+id).classList.add('is-active');
}
function deleteImage(id, wi, ii) {
  COURSES[id].curriculum[wi].images.splice(ii, 1);
  renderCurriculumView(id);
  document.getElementById('cr-'+id)?.classList.add('is-active');
}
function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox__close" onclick="this.parentElement.remove()">✕</button><img src="${url}" alt="">`;
  lb.addEventListener('click', e => { if (e.target === lb) lb.remove(); });
  document.body.appendChild(lb);
}

  // 백그라운드에서 Firebase 로드 — 데이터 변경 시에만 재렌더

  await initFirebase();
  const snapAfter  = JSON.stringify({ COURSES, UI_DATA, INSTRUCTORS_DATA, REVIEWS_DATA });

    renderUI();
    renderAll();
    activateCoursePanels(currentCourse);

});
